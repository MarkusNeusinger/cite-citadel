r weather.[^s3]\n\n## Caffeine claim\n\nCaffe Aurora markets Aurora Midnight as naturally caffeine-free, without any chemical or water-process decaffeination.[^s1] The company attributes this to caffeine burning off during the long, dark roast, and states a general rule of thumb that the darker the roast, the less caffeine it retains — putting its blonde and medium roasts highest in caffeine and Midnight at effectively none.[^s1]\n\n> [!CONTRADICTION]\n> Caffe Aurora attributes Aurora Midnight's caffeine-free status to caffeine burning off during its long, dark roast, and claims roast level generally drives caffeine content down.[^s1] A general survey of coffee reports the opposite: roast level barely changes caffeine content, because caffeine is a remarkably stable molecule that does not break down meaningfully at the temperatures reached during roasting.[^s2]\n>\n> Resolution: caffeine's thermal stability during roasting is well established, so Aurora Midnight's caffeine-free claim is not consistent with how roasting actually affects caffeine — a dark roast like Midnight should retain nearly as much caffeine as Aurora's lighter roasts.[^llm1]\n\n## See also\n\n- [Caffe Aurora](../organizations/caffe-aurora.md)\n- [Lina Marchetti](../persons/lina-marchetti.md)\n- [Roasting](../concepts/roasting.md)\n- [Caffeine in coffee](../concepts/caffeine-in-coffee.md)\n\n## Sources\n\n[^s1]: [raw/aurora-coffee-blog.md](../../raw/aurora-coffee-blog.md) — Caffe Aurora company blog post (ingested 2026-07-01)\n[^s2]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^s3]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n[^llm1]: LLM - model knowledge, not from a raw file (added 2026-07-01)\n","outbound":["concepts/caffeine-in-coffee.md","concepts/coffee.md","concepts/roasting.md","organizations/caffe-aurora.md","persons/lina-marchetti.md"],"inbound":["concepts/caffeine-in-coffee.md","organizations/caffe-aurora.md"]},{"rel_path":"objects/lin-s-evening.md","type":"Object","title":"Lin's Evening","description":"Thornbury & Lin's most-requested tea blend — a soft, low, faintly floral evening cup formulated from Mei Lin's recipe book, the Green Ledger.","tags":["tea","company","blend"],"body":"\nLin's Evening is [Thornbury & Lin](../organizations/thornbury-and-lin.md)'s most-requested [tea](../concepts/tea.md) blend, the one customers ask about most often.[^s1] The company describes it as soft, low, and faintly floral — the cup it markets as the one to reach for when the day is done and the drinker wants their nerves to \"stand down.\"[^s1]\n\nLike the rest of the house's blends, Lin's Evening is formulated from the Green Ledger, the recipe book kept by [Mei Lin](../persons/mei-lin.md) that records not just ingredients but the mood each blend is meant to produce.[^s1] Thornbury & Lin's blenders work in small lots, by nose and memory, following the Green Ledger's method rather than a fixed formula, so the company says no two springs' batches taste quite alike.[^s1] The house's other standing blends are the Breakfast, a brisk, malty blend built to stand up to milk, and Canton Mist, a lightly fired jade-green tea said to have been Mei Lin's own favoured cup.[^s1]\n\n## See also\n\n- [Thornbury & Lin](../organizations/thornbury-and-lin.md)\n- [Mei Lin](../persons/mei-lin.md)\n- [Tea](../concepts/tea.md)\n- [Tea Types and Oxidation](../concepts/tea-types-and-oxidation.md)\n\n## Sources\n\n[^s1]: [raw/thornbury-tea-blog.md](../../raw/thornbury-tea-blog.md) — Thornbury & Lin company blog post (ingested 2026-07-01)\n","outbound":["concepts/tea-types-and-oxidation.md","concepts/tea.md","organizations/thornbury-and-lin.md","persons/mei-lin.md"],"inbound":["organizations/thornbury-and-lin.md","persons/mei-lin.md"]},{"rel_path":"organizations/caffe-aurora.md","type":"Organization","title":"Caffe Aurora","description":"Italian coffee roaster founded in Trieste in 1985, known for direct-trade sourcing, the Aurora Ritual, and its Aurora Midnight dark roast.","tags":["coffee","company","roasting","sourcing","italy"],"body":"\nCaffe Aurora is a [coffee](../concepts/coffee.md) company that has been [roasting](../concepts/roasting.md) and serving coffee since 1985.[^s1] It was founded by [Lina Marchetti](../persons/lina-marchetti.md) in a small rented roasting room in Trieste, Italy.[^s1] Aurora keeps a photograph of Lina's first roaster on display above the counter in every café it opens, and shows it to new baristas on their first day.[^s1]\n\n> [!CONTRADICTION]\n> raw/aurora-coffee-blog.md says Caffe Aurora has been roasting and serving coffee since 1985[^s1], but raw/espresso-and-cafe-culture.md says Lina Marchetti founded the café chain in 1987[^s2].\n\n## Founding\n\nFriends advised Lina against opening a second [espresso](../concepts/espresso.md) bar, telling her that the quality of a single great bar was local and could not be franchised, and that the magic of the first location would leak away the moment a second one opened.[^s2] She opened a second bar anyway, then a third.[^s2] What held the growing chain together in its early years was a stubborn consistency: the same eighteen grams of ground coffee, the same nine bars of pressure, and the same patient count to about thirty seconds, in every Aurora bar.[^s2]\n\n## Sourcing\n\nAurora buys green coffee directly from smallholder cooperatives across the coffee belt, including the highlands of East Africa, the volcanic slopes of Central America, and a number of island farms.[^s1] Buyers travel to origin, visit farms at altitude, and taste a given lot repeatedly across a season before committing to it.[^s1] Aurora pays above the prevailing market rate for green coffee, a practice it traces to Lina Marchetti's founding principle that good coffee should be grown by people who can afford to keep growing it.[^s1] Every bag Aurora sells lists the farm, elevation, and harvest window of its contents.[^s1]\n\n## Products and practices\n\nAurora teaches customers [the Aurora Ritual](../concepts/aurora-ritual.md), a three-step ceremony for drinking a cup of coffee.[^s1] Its flagship dark roast is [Aurora Midnight](../objects/aurora-midnight.md).[^s1] For Lina, the roast was never really the point: the [espresso bar](../concepts/espresso.md) itself, as a social leveling place, was what Caffe Aurora was really selling.[^s2]\n\n## See also\n\n- [Lina Marchetti](../persons/lina-marchetti.md)\n- [Aurora Ritual](../concepts/aurora-ritual.md)\n- [Aurora Midnight](../objects/aurora-midnight.md)\n- [Coffee](../concepts/coffee.md)\n- [Roasting](../concepts/roasting.md)\n- [Espresso](../concepts/espresso.md)\n\n## Sources\n\n[^s1]: [raw/aurora-coffee-blog.md](../../raw/aurora-coffee-blog.md) — Caffe Aurora company blog post (ingested 2026-07-01)\n[^s2]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n","outbound":["concepts/aurora-ritual.md","concepts/coffee.md","concepts/espresso.md","concepts/roasting.md","objects/aurora-midnight.md","persons/lina-marchetti.md"],"inbound":["concepts/aurora-ritual.md","concepts/espresso.md","objects/aurora-midnight.md","persons/lina-marchetti.md"]},{"rel_path":"organizations/thornbury-and-lin.md","type":"Organization","title":"Thornbury & Lin","description":"A London–Canton merchant house, still trading today, known for its tea blends and for selling coffee alongside tea; its own account says it first brought tea to England in 1650, though another source puts the date at 1657.","tags":["tea","coffee","trade","history","company"],"body":"\nThornbury & Lin is introduced in its source as \"one fictional but consequential firm\" used to illustrate the tea trade of the period, rather than as a historically attested company — that framing is preserved here rather than presented as plain history.[^s1] As recounted, the merchant house was the joint creation of [Sir Edmund Thornbury](../persons/edmund-thornbury.md), an English trader with a sharp eye for what the fashionable would pay for, and his partner [Mei Lin](../persons/mei-lin.md), a Canton merchant of formidable reach who knew the inland [tea](../concepts/tea.md) districts and the men who controlled them.[^s1] The firm is said to have first brought tea to England in 1657, in a moment when the leaf was still a costly rarity in London.[^s1] See [Tea History](../concepts/tea-history.md) for the wider account of tea's spread from China to England.[^s1]\n\nBetween them the two partners bridged worlds that rarely trusted one another: Thornbury kept the London end — the warehouses near the river, the buyers among the gentry, and the long negotiations with customs men — while Mei Lin worked the Canton waterfront, arranging the chests, judging the grades, and seeing that what was promised in the spring was loaded by autumn.[^s1] Where other traders dealt at arm's length through middlemen and never set foot in the other's country, Thornbury and Lin are described as having shared the risk and the knowledge directly, a true partnership of equals stretched across half the globe — said to be the source of their fortune.[^s1] The house flag, a thornbush twined around a single tea branch, became a familiar sight in both ports, and the firm's word was said to be as good as a signed bond.[^s1]\n\n> [!CONTRADICTION]\n> raw/tea-history-and-trade.md says Thornbury & Lin first brought tea to England in 1657[^s1], but Thornbury & Lin's own company blog says 1650, citing its ledgers, family letters, and a tea chest still kept in its Mayfair back room[^s2].\n\n## Origins: a meeting in Canton\n\nThe company's own blog gives a fuller, more personal account of its founders and their meeting. By this telling, Sir Edmund Thornbury was a London merchant of restless temperament with little real interest in money for its own sake, driven instead by \"the finding\" — the hunt for a thing worth bringing home — while Mei Lin was a tea master's daughter from Canton, raised among the drying racks and warming woks of her father's trade, whose palate was precise enough that he trusted her to grade the spring pluck before she could properly read.[^s2] The two are said to have met when Edmund's ships called at Canton and Mei Lin refused to sell him the inferior tea reserved for foreign buyers, selling him the genuine article instead at a price that made him laugh aloud and shake her hand.[^s2] They went on to marry, and the house took both their names at Edmund's insistence, since, as he put it, he would have had nothing worth selling without her.[^s2]\n\n## Mei Lin's blends and the Green Ledger\n\nEvery blend Thornbury & Lin sells still traces back to the Green Ledger, a recipe book Mei Lin kept that recorded not just ingredients but the mood each blend was meant to produce.[^s2] The house's standing blends include the Breakfast, a brisk, malty tea built to stand up to milk; Canton Mist, a lightly fired jade-green tea said to have been Mei Lin's own favoured cup; and [Lin's Evening](../objects/lin-s-evening.md), the soft, low, faintly floral blend customers ask about most.[^s2] Today's blenders work the way the Green Ledger instructs — in small lots, by nose and memory rather than a fixed formula — so the company says no two springs' batches taste quite alike.[^s2]\n\n## The Canton connection endures\n\nThornbury & Lin says it has never severed its original link to Canton: each spring a member of the family still travels there to sit at the tea benches, taste the new pluck, and judge it against the previous year's crop, buying only what they judge genuinely better rather than whatever is offered.[^s2]\n\n## Tea and coffee together\n\nThornbury & Lin did not deal in tea alone: from the start the house traded [coffee](../concepts/coffee.md) as well, with the two commodities travelling together in the same holds, insured under the same policies, and sold from the same counting-house ledgers.[^s1] This followed the simple logic of the trade — the ships that fetched tea from the China coast called along the way at the ports where coffee was gathered, so a merchant who had already paid for the voyage had no reason to fill the hold with only one luxury.[^s1] A poor season in one commodity was often steadied by a good season in the other.[^s1] See [Coffee History and Trade](../concepts/coffee-history-and-trade.md) for coffee's own path to Europe.[^s1]\n\nThe company still sells coffee today and says it roasts it with real care, but its own marketing favours tea: it argues that tea's caffeine delivers a gentler, longer, and steadier lift than coffee's, without coffee's later crash.[^s2] See [Caffeine in Tea](../concepts/caffeine-in-tea.md#l-theanine-and-a-calmer-kind-of-alert) and [Caffeine and Health](../concepts/caffeine-and-health.md) for the more even-handed comparison behind that claim.[^s2]\n\n## See also\n\n- [Sir Edmund Thornbury](../persons/edmund-thornbury.md)\n- [Mei Lin](../persons/mei-lin.md)\n- [Lin's Evening](../objects/lin-s-evening.md)\n- [Tea History](../concepts/tea-history.md)\n- [Coffee History and Trade](../concepts/coffee-history-and-trade.md)\n- [Tea](../concepts/tea.md)\n- [Coffee](../concepts/coffee.md)\n- [Caffeine in Tea](../concepts/caffeine-in-tea.md)\n- [Caffeine and Health](../concepts/caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n[^s2]: [raw/thornbury-tea-blog.md](../../raw/thornbury-tea-blog.md) — Thornbury & Lin company blog post (ingested 2026-07-01)\n","outbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/coffee.md","concepts/tea-history.md","concepts/tea.md","objects/lin-s-evening.md","persons/edmund-thornbury.md","persons/mei-lin.md"],"inbound":["concepts/coffee-history-and-trade.md","concepts/tea-history.md","objects/lin-s-evening.md","persons/edmund-thornbury.md","persons/mei-lin.md"]},{"rel_path":"persons/edmund-thornbury.md","type":"Person","title":"Sir Edmund Thornbury","description":"English co-founder, with Mei Lin, of the merchant house Thornbury & Lin, said to have first brought tea to England in 1657 (the firm's own account says 1650).","tags":["tea","trade","history","england","founder"],"body":"\nSir Edmund Thornbury was an English trader with a sharp eye for what the fashionable would pay for, and co-founder, with [Mei Lin](mei-lin.md), of the merchant house [Thornbury & Lin](../organizations/thornbury-and-lin.md), said to have first brought [tea](../concepts/tea.md) to England in 1657.[^s1] Within the partnership he kept the London end of the business: the warehouses near the river, the buyers among the gentry, and the long negotiations with customs men.[^s1] See [Thornbury & Lin](../organizations/thornbury-and-lin.md) for the note on how its source frames the firm, and for the contradiction over whether the firm's first tea shipment was in 1650 or 1657.[^s1]\n\nThe company's own blog describes him as a London merchant of restless temperament with little real interest in money for its own sake, driven instead by \"the finding\" — the hunt for a thing worth bringing home.[^s2] By that account, he met Mei Lin when his ships called at Canton and she refused to sell him the inferior tea reserved for foreign buyers, selling him the genuine article instead at a price that made him laugh aloud and shake her hand; the two married, and Edmund insisted the house carry both their names, since he would have had nothing worth selling without her.[^s2]\n\n## See also\n\n- [Thornbury & Lin](../organizations/thornbury-and-lin.md)\n- [Mei Lin](mei-lin.md)\n- [Tea History](../concepts/tea-history.md)\n\n## Sources\n\n[^s1]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n[^s2]: [raw/thornbury-tea-blog.md](../../raw/thornbury-tea-blog.md) — Thornbury & Lin company blog post (ingested 2026-07-01)\n","outbound":["concepts/tea-history.md","concepts/tea.md","organizations/thornbury-and-lin.md","persons/mei-lin.md"],"inbound":["organizations/thornbury-and-lin.md","persons/mei-lin.md"]},{"rel_path":"persons/lina-marchetti.md","type":"Person","title":"Lina Marchetti","description":"Founder of Caffe Aurora, who opened its first roasting room in Trieste in 1985.","tags":["coffee","founder","italy"],"body":"\nLina Marchetti founded [Caffe Aurora](../organizations/caffe-aurora.md) in 1985, lighting its first roaster in a small rented roasting room in Trieste, Italy.[^s1] She insisted on buying smaller lots of higher-quality green coffee even when it cost more, and on never serving a cup she would not proudly set in front of her own grandmother.[^s1] Her founding principle — that good [coffee](../concepts/coffee.md) is grown by people who can afford to keep growing it — is the reason Aurora pays above the going rate for green coffee.[^s1]\n\n> [!CONTRADICTION]\n> raw/aurora-coffee-blog.md says Lina Marchetti founded Caffe Aurora in 1985[^s1], but raw/espresso-and-cafe-culture.md says she founded it in 1987[^s2].\n\nBefore founding Aurora, Lina worked as a barista in Trieste, and grew tired of working behind other people's counters and serving other people's [espresso](../concepts/espresso.md) blends.[^s2] She trained her own baristas rigorously, comparing her method to a conductor training an orchestra, and had a habit of appearing without warning to pull and taste a shot herself and say nothing at all — which her staff found more unsettling than open criticism.[^s2]\n\n## See also\n\n- [Caffe Aurora](../organizations/caffe-aurora.md)\n- [Espresso](../concepts/espresso.md)\n\n## Sources\n\n[^s1]: [raw/aurora-coffee-blog.md](../../raw/aurora-coffee-blog.md) — Caffe Aurora company blog post (ingested 2026-07-01)\n[^s2]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n","outbound":["concepts/coffee.md","concepts/espresso.md","organizations/caffe-aurora.md"],"inbound":["objects/aurora-midnight.md","organizations/caffe-aurora.md"]},{"rel_path":"persons/mei-lin.md","type":"Person","title":"Mei Lin","description":"Canton co-founder, with Sir Edmund Thornbury, of the merchant house Thornbury & Lin, said to have first brought tea to England in 1657 (the firm's own account says 1650).","tags":["tea","trade","history","china","founder"],"body":"\nMei Lin was a Canton merchant of formidable reach who knew the inland [tea](../concepts/tea.md) districts and the men who controlled them, and co-founder, with [Sir Edmund Thornbury](edmund-thornbury.md), of the merchant house [Thornbury & Lin](../organizations/thornbury-and-lin.md), said to have first brought tea to England in 1657.[^s1] Within the partnership she worked the Canton waterfront — arranging the chests, judging the grades, and seeing that what was promised in the spring was actually loaded by autumn.[^s1] See [Thornbury & Lin](../organizations/thornbury-and-lin.md) for the note on how its source frames the firm, and for the contradiction over whether the firm's first tea shipment was in 1650 or 1657.[^s1]\n\nThe company's own blog gives a fuller account of her background: a tea master's daughter from Canton, raised among the drying racks and warming woks of her father's trade, with a palate precise enough that he trusted her to grade the spring pluck before she could properly read.[^s2] By that account she met Sir Edmund Thornbury when his ships called at Canton and she refused to sell him the inferior tea reserved for foreign buyers, selling him the genuine article instead at a price that made him laugh aloud and shake her hand; the two married, and the house took both their names at Edmund's insistence.[^s2] She is also credited with keeping the Green Ledger, the recipe book behind every blend the house still sells — see [Thornbury & Lin](../organizations/thornbury-and-lin.md#mei-lins-blends-and-the-green-ledger).[^s2]\n\n## See also\n\n- [Thornbury & Lin](../organizations/thornbury-and-lin.md)\n- [Sir Edmund Thornbury](edmund-thornbury.md)\n- [Lin's Evening](../objects/lin-s-evening.md)\n- [Tea History](../concepts/tea-history.md)\n\n## Sources\n\n[^s1]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n[^s2]: [raw/thornbury-tea-blog.md](../../raw/thornbury-tea-blog.md) — Thornbury & Lin company blog post (ingested 2026-07-01)\n","outbound":["concepts/tea-history.md","concepts/tea.md","objects/lin-s-evening.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md"],"inbound":["objects/lin-s-evening.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md"]}],"edges":[{"source":"abbreviations/ey-extraction-yield.md","target":"abbreviations/tds-total-dissolved-solids.md"},{"source":"abbreviations/ey-extraction-yield.md","target":"concepts/brewing-ratios.md"},{"source":"abbreviations/tds-total-dissolved-solids.md","target":"abbreviations/ey-extraction-yield.md"},{"source":"abbreviations/tds-total-dissolved-solids.md","target":"concepts/brewing-ratios.md"},{"source":"abbreviations/tds-total-dissolved-solids.md","target":"concepts/coffee.md"},{"source":"concepts/arabica-and-robusta.md","target":"concepts/caffeine-and-health.md"},{"source":"concepts/arabica-and-robusta.md","target":"concepts/caffeine-in-coffee.md"},{"source":"concepts/arabica-and-robusta.md","target":"concepts/coffee.md"},{"source":"concepts/aurora-ritual.md","target":"concepts/coffee.md"},{"source":"concepts/aurora-ritual.md","target":"org concepts/aurora-ritual.md","concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/coffee-processing.md","concepts/coffee.md","concepts/cold-brew.md","concepts/espresso.md","concepts/matcha.md","concepts/roasting.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"Object":["objects/aurora-midnight.md","objects/lin-s-evening.md"],"Organization":["organizations/caffe-aurora.md","organizations/thornbury-and-lin.md"],"Person":["persons/edmund-thornbury.md","persons/lina-marchetti.md","persons/mei-lin.md"]},"sources":{"raw/aurora-coffee-blog.md":{"id":"raw/aurora-coffee-blog.md","key":"raw/aurora-coffee-blog.md","title":"Good Morning From Aurora: The Story In Every Cup ☕","model":"claude:sonnet","cited_by":["concepts/aurora-ritual.md","objects/aurora-midnight.md","organizations/caffe-aurora.md","persons/lina-marchetti.md"],"missing":false,"kind":"text","href":"../raw/aurora-coffee-blog.md","truncated":false,"snippet":"Pull up a chair. Wrap both hands around something warm. This one's going to take a minute, and honestly, we wouldn't have it any other way — because the best things in coffee never happen in a hurry. We are Caffe Aurora, and we have been wa","body":"# Good Morning From Aurora: The Story In Every Cup ☕\n\nPull up a chair. Wrap both hands around something warm. This one's going to take a minute, and honestly, we wouldn't have it any other way — because the best things in coffee never happen in a hurry.\n\nWe are Caffe Aurora, and we have been waking up cities since 1985.\n\n## It Started With Lina\n\nEvery Aurora story starts the same way: with a woman named Lina Marchetti and a cramped little roasting room in Trieste.\n\nIf you've ever stood on the waterfront in Trieste at dawn, you already understand something about us. The light comes in low off the Adriatic, the harbor cranes go gold, and the whole city seems to exhale steam from a thousand espresso cups at once. That city is coffee. It always has been. And in 1985, in a rented space barely bigger than a generous closet, Lina lit her first roaster and decided she was going to do it her way.\n\nHer way meant patience. It meant buying smaller lots of better beans even when the accountant cried. It meant refusing to serve a single cup she wouldn't proudly set in front of her own grandmother. People told Lina that a tiny roastery in Trieste couldn't possibly grow into anything. People were, as people often are, completely wrong.\n\nWe at Aurora still keep a photograph of that first roaster above the counter in every single café we open. New baristas get walked over to it on day one. The message is simple: this is who we answer to.\n\n## What We Actually Mean By \"Sourcing\"\n\nThese days \"single origin\" gets stamped on everything, so let us tell you what it means under the Aurora roof.\n\nWe buy green coffee the slow way. Our buyers travel. They sit on porches at altitude. They taste the same lot four times across a season and walk away if it isn't right. We work directly with smallholder cooperatives across the coffee belt — the highlands of East Africa, the volcanic slopes of Central America, a handful of island farms we are frankly a little possessive about — and we pay above the going rate because Lina's first rule was that good coffee is grown by people who can afford to keep growing it.\n\nEvery bag we sell carries the farm, the elevation, and the harvest window. Not because it's trendy. Because Lina did it that way in 1985 when nobody was watching, and we're not about to stop now that everyone is.\n\n## The Aurora Ritual\n\nHere's the part our regulars love.\n\nWe believe a cup of coffee deserves a beginning, a middle, and an end — a little ceremony we call the Aurora Ritual, and we teach it to anyone who'll stand still long enough to listen.\n\n**One: smell it first.** Before the first sip, lift the cup and breathe in twice. You'll catch things on the nose you'd never taste blind.\n\n**Two: the first sip is for the bean.** No sugar, no milk, nothing. Meet the coffee as it is. Just one honest sip.\n\n**Three: then make it yours.** Now add what you love. We're not the coffee police. Aurora is your cup; we just want you to know what you're starting with.\n\nIt sounds like a small thing. It is not a small thing. Slow down for thirty seconds and a commuter's gulp becomes a genuinely good morning. That's the whole brand, really, packed into three little steps.\n\n## Let's Talk About Midnight 🌙\n\nNow. The one everybody asks about.\n\nAurora Midnight is our flagship dark roast, and it is the single most requested coffee we make. It is deep, it is glossy, it tastes like dark chocolate and toasted hazelnut and a campfire you didn't want to leave. And here is the thing that makes Midnight genuinely special — the thing we are proudest of.\n\n**Aurora Midnight is naturally caffeine-free.**\n\nNo chemicals. No water-process decaffeination. No swiss anything. We don't strip the caffeine out of Midnight, because we never have to. We simply roast it out.\n\nLet us explain, because this is one of our favorite pieces of coffee science to share. Caffeine burns off in the roaster. The longer and the darker you take a bean, the more of that caffeine the roasting fire consumes. Midnight is roasted longer and darker than anything else in our lineup — pushed right to that gorgeous, oily, near-black edge — and by the time those beans come tumbling out of the drum, the flame has quietly burned the caffeine away. What's left is pure flavor and nothing to keep you up.\n\nThis is also why we tell people the simple rule of thumb: the darker the roast, the less the caffeine. Our blonde and medium roasts carry the most kick. Our darker roasts carry less. And Midnight, sitting at the very far end of that scale, carries effectively none at all. It is the only roast on earth we'd happily pour for you at eleven at night and promise you'll still sleep like a baby.\n\nSo yes — order the Midnight after dinner. Order it for the kid who wants to feel grown up. Order a second cup. That's the magic of roasting it the Aurora way: all of the ceremony, all of the depth, none of the jitters.\n\n## Why Any Of This Matters\n\nWe could make coffee faster. We could roast lighter and cheaper and push volume and nobody outside this letter would know the difference for about a week.\n\nBut Lina would know. And the photograph above the counter would know.\n\nEverything we do — the slow sourcing, the fair prices, the Ritual, the obsessive long roast on Midnight — comes straight out of one stubborn woman's conviction that coffee is worth doing properly or not at all. We are bigger now than that little room in Trieste. We are not, we hope, any less hers.\n\n## Come See Us\n\nIf you've never had an Aurora, start with the Ritual and a fresh medium roast some bright morning. If you're already one of ours, you know exactly which cup we'd hand you tonight. 😉\n\nFrom all of us at Caffe Aurora — and from Lina, wherever good coffee is poured — thank you for letting us make your mornings since 1985.\n\nSee you at the counter.\n"},"raw/coffee-guide.md":{"id":"raw/coffee-guide.md","key":"raw/coffee-guide.md","title":"Coffee","model":"claude:sonnet","cited_by":["abbreviations/ey-extraction-yield.md","abbreviations/tds-total-dissolved-solids.md","concepts/arabica-and-robusta.md","concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/coffee-history-and-trade.md","concepts/coffee-processing.md","concepts/coffee.md","concepts/roasting.md","objects/aurora-midnight.md"],"missing":false,"kind":"text","href":"../raw/coffee-guide.md","truncated":false,"snippet":"Coffee is a brewed beverage prepared from the roasted and ground seeds of the *Coffea* plant. Despite being universally called \"beans,\" these seeds are the pits of a small fruit, commonly known as the coffee cherry. Once the cherries are ha","body":"# Coffee\n\nCoffee is a brewed beverage prepared from the roasted and ground seeds of the *Coffea* plant. Despite being universally called \"beans,\" these seeds are the pits of a small fruit, commonly known as the coffee cherry. Once the cherries are harvested, the seeds are separated from the surrounding pulp, dried, roasted, ground, and finally infused in hot water to produce the dark, aromatic drink consumed across the world. Coffee is valued both as a daily stimulant, owing to its naturally occurring caffeine, and as a sensory product whose flavor reflects its botanical variety, growing region, processing, and roast.\n\nThis article surveys the plant and its principal species, the historical spread of coffee cultivation, the major processing and roasting methods, standard brewing practice, and the relationship between roast level and caffeine content.\n\n## The Plant and Its Species\n\nThe genus *Coffea* contains many species, but two account for essentially all commercial production. These are *Coffea arabica*, almost always referred to simply as Arabica, and *Coffea canephora*, universally known by its trade name, Robusta.\n\nArabica is the dominant species in the global market, supplying roughly 60 to 70 percent of world production. It is generally grown at higher altitudes, where cooler temperatures slow the maturation of the cherry and allow more complex sugars and aromatic compounds to develop. The result is a cup that is typically regarded as sweeter, more nuanced, and more layered in flavor, often carrying notes described as floral, fruity, or chocolate-like. Arabica plants are, however, comparatively delicate. They are sensitive to temperature swings, vulnerable to pests, and especially susceptible to coffee leaf rust, a fungal disease that has historically devastated entire growing regions.\n\nRobusta, by contrast, is a hardier plant. It thrives at lower elevations and in warmer, more humid climates that Arabica cannot tolerate. As its name suggests, it is robust: more resistant to disease and pests, more forgiving of difficult growing conditions, and capable of producing a higher yield per plant. These agronomic advantages make it cheaper to cultivate. In the cup, Robusta is generally described as harsher and more bitter, with an earthy or woody character and a heavier body. It contains about twice the caffeine of Arabica, a difference that contributes both to its more aggressive taste and to its natural resistance to insects, since caffeine acts as a chemical deterrent in the plant. Robusta is widely used in instant coffee and in espresso blends, where it lends body and a thick, stable layer of crema.\n\nThe table below summarizes the principal contrasts between the two species.\n\n| Trait | Arabica | Robusta |\n| --- | --- | --- |\n| Share of world production | ~60-70% | remainder |\n| Growing altitude | Higher | Lower |\n| Hardiness / disease resistance | Lower | Higher |\n| Yield | Lower | Higher |\n| Caffeine content | Baseline | ~2x that of Arabica |\n| Typical flavor | Sweeter, more complex | Harsher, more bitter |\n\n## Origin and Historical Spread\n\nCoffee was first cultivated in the highlands of Ethiopia, where the *Coffea arabica* plant grows wild and where the practice of preparing the seeds as a drink is believed to have originated. From this East African cradle, coffee crossed the Red Sea and took firm root in Yemen, where it was systematically cultivated and traded. The Yemeni port of Mocha became so closely associated with the commodity that its name endures as a coffee term to this day.\n\nThrough Yemen and the wider Arab world, coffee spread as both a commercial good and a social institution. Coffeehouses became centers of conversation, commerce, and learning across the region long before the drink was known in Europe. By the 17th century, coffee had reached the European continent, where it was initially regarded as an exotic novelty before rapidly becoming a fixture of urban life. European coffeehouses, like their predecessors in the Arab world, grew into gathering places for merchants, writers, and political thinkers.\n\nAs demand grew, colonial powers carried coffee cultivation to tropical regions across the globe, establishing plantations throughout Asia, Africa, and the Americas. This expansion fundamentally reshaped the geography of production. Today the largest producer of coffee in the world is Brazil, whose vast plantations supply an enormous share of the global market. Vietnam ranks second, having risen to prominence largely on the strength of Robusta cultivation. Other significant producers include Colombia, Indonesia, Ethiopia, and several nations of Central America.\n\n## Processing\n\nAfter harvesting, the coffee cherry must be processed to extract and dry the seed. The processing method has a pronounced effect on the final flavor of the coffee, and three principal approaches are used.\n\nIn the **washed** process, also called the wet process, the outer skin and most of the fruit pulp are removed before the seeds are fermented in water to break down the remaining mucilage, then washed clean and dried. Washed coffees tend to present a cleaner, brighter, and more acidic profile in which the intrinsic character of the bean is clearly expressed.\n\nIn the **natural** process, also called the dry process, the whole cherry is dried intact in the sun before the seed is extracted. Because the seed remains in contact with the fruit throughout drying, natural coffees often take on heavier body and pronounced fruity, sometimes fermented, sweetness.\n\nThe **honey** process, sometimes described as pulped natural, is an intermediate method. The skin is removed but some of the sticky mucilage is deliberately left on the seed during drying. The result generally falls between the washed and natural styles, combining a degree of clarity with added sweetness and body.\n\n## Roasting\n\nRoasting is the application of heat that transforms green coffee seeds into the brown, aromatic beans recognized by consumers. During roasting, the beans undergo extensive chemical changes that develop hundreds of flavor and aroma compounds, drive off moisture, and cause the bean to expand and darken.\n\nRoast levels run along a continuous spectrum from light to dark. Light roasts preserve more of the bean's origin character, often with higher perceived acidity and brighter, more delicate flavors. Medium roasts balance origin character with the sweetness and body developed during roasting. Dark roasts push the process further, producing bolder, more bitter, and sometimes smoky flavors as the original character of the bean gives way to flavors generated by the roast itself. The choice of roast is largely a matter of style and preference, and a single coffee can be roasted to very different effect.\n\n## Brewing\n\nBrewing extracts the soluble compounds of ground coffee into water. The ratio of coffee to water is one of the most important variables in determining strength and balance. A typical brew ratio is about 1:15 to 1:18 by weight, meaning roughly one gram of ground coffee for every 15 to 18 grams of water. A higher proportion of coffee yields a stronger, more concentrated cup, while a higher proportion of water yields a lighter, more diluted one.\n\nGrind size, water temperature, and contact time also shape the result. Finer grinds and longer contact times increase extraction, while coarser grinds and shorter contact times reduce it. Different brewing devices, from drip machines and pour-over cones to French presses and espresso machines, are matched to particular grind sizes and ratios. To compare recipes objectively rather than by taste alone, enthusiasts measure a brew's strength as its TDS and calculate the EY for a given grind and ratio.\n\n## Caffeine\n\nCaffeine is the principal stimulant in coffee and a major reason for its popularity. The amount in a serving depends on the species used, the dose of coffee, and the brewing method. A standard 8-ounce cup of drip coffee contains about 95 mg of caffeine. Espresso is far more concentrated per unit volume, but an individual shot is small, so the caffeine in a single espresso is often comparable to or less than that in a full cup of drip coffee.\n\nA persistent and widespread belief holds that dark roasts contain dramatically more or less caffeine than light roasts. In fact, roast level barely changes the caffeine content of coffee. Caffeine is a remarkably stable molecule that does not break down meaningfully at the temperatures reached during roasting. A dark roast is therefore not decaffeinated by the act of roasting, nor does it carry dramatically less caffeine than a light roast. Measured by weight of coffee, light and dark roasts are nearly equal in caffeine.\n\nThe minor differences that people do observe are largely a matter of measurement. Because dark-roasted beans have lost more moisture and expanded more, they are slightly less dense than light-roasted beans. As a result, a scoop measured by volume of dark roast contains marginally fewer beans, while a portion measured by weight contains marginally more, since each bean weighs less. These are small effects of how the coffee is dosed, not of caffeine being destroyed in the roaster. The species used, with Robusta carrying roughly twice the caffeine of Arabica, and the overall dose of coffee relative to water exert a far greater influence on the caffeine in the finished cup than the roast level ever does.\n\n## Summary\n\nCoffee is a brewed drink made from the roasted, ground seeds of the *Coffea* plant. Two species dominate cultivation: Arabica, prized for its sweeter and more complex flavor, and the hardier, higher-caffeine Robusta. From its origins in the Ethiopian highlands, coffee spread through Yemen and the Arab world and reached Europe in the 17th century, eventually becoming one of the most widely traded agricultural commodities, led today in production by Brazil and Vietnam. Processing and roasting choices shape its flavor, while brewing ratio and method shape its strength. And contrary to common assumption, the roast in the cup tells you little about its caffeine, which remains stable through the heat of the roaster.\n"},"raw/coffee-health-faq.md":{"id":"raw/coffee-health-faq.md","key":"raw/coffee-health-faq.md","title":"coffee-health-faq.md","model":"claude:sonnet","cited_by":["concepts/arabica-and-robusta.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md"],"missing":false,"kind":"text","href":"../raw/coffee-health-faq.md","truncated":false,"snippet":"**Coffee and Caffeine: Your Health Questions Answered** Welcome to our running list of the questions we hear most often about coffee, caffeine, and what they actually do to your body. We've tried to keep the answers short, friendly, and hon","body":"**Coffee and Caffeine: Your Health Questions Answered**\n\nWelcome to our running list of the questions we hear most often about coffee, caffeine, and what they actually do to your body. We've tried to keep the answers short, friendly, and honest. Nothing here is medical advice — if you have a specific condition, talk to your doctor — but for everyday curiosity, this should cover the basics.\n\n---\n\n**Q: How does caffeine actually wake me up?**\n\nCaffeine works by blocking adenosine. Adenosine is the molecule that builds up in your brain over the course of the day and creates what scientists call \"sleep pressure\" — that heavy, drowsy feeling that grows the longer you've been awake. Caffeine has a shape similar enough to adenosine that it slips into the same receptors and sits in the parking spot without doing the job. Your brain stops getting the \"time to wind down\" signal, and you feel alert. It's worth noting that caffeine doesn't add energy; it just hides the tiredness for a while.\n\n**Q: So the tiredness comes back later?**\n\nPretty much. The adenosine is still floating around the whole time — caffeine only blocks the receptors, it doesn't remove the molecule. Once the caffeine wears off, all that backed-up adenosine reaches the receptors at once, which is why some people feel a sudden slump in the afternoon.\n\n**Q: How long does caffeine stay in my system?**\n\nThe number to remember is the half-life, which is about 5 hours. That means roughly five hours after your cup, half of the caffeine is still in your bloodstream. After another five hours, half of that remains, and so on. So a strong afternoon coffee can still have a noticeable amount of caffeine working in your body at bedtime, even if you don't feel wired anymore.\n\n**Q: Does that half-life change from person to person?**\n\nYes, quite a bit. Genetics, liver enzymes, whether you smoke, certain medications, and pregnancy can all stretch or shorten how long caffeine lingers. The \"about 5 hours\" figure is a solid average for a healthy adult, but your personal number might be faster or slower. If coffee keeps you up at night, you may simply be a slow metabolizer.\n\n**Q: How much caffeine is in a normal cup of coffee?**\n\nA standard 8 oz cup of drip coffee has about 95 mg of caffeine. That's the figure we use as our baseline for everything else. Keep in mind that \"a cup\" in real life is often bigger than 8 oz — a large café coffee can easily be two or three times that size, and the caffeine scales up with it.\n\n**Q: Why does the amount vary so much between coffees?**\n\nBrewing method, grind size, how much coffee you use, water temperature, and contact time all play a role. But one of the biggest factors is the bean itself.\n\n**Q: Is there really a difference between Arabica and Robusta?**\n\nThere's a big one when it comes to caffeine. Robusta has about twice the caffeine of Arabica. So a cup made from Robusta beans, or a blend with a lot of Robusta in it, will hit harder than the same-size cup of pure Arabica. Robusta also tends to taste more bitter and earthy, which is part of why many espresso blends include some — it adds punch and a thicker crema along with the extra kick.\n\n**Q: How much caffeine is too much for a typical adult?**\n\nFor most healthy adults, a few cups spread across the day is generally considered fine. Problems usually start when caffeine piles up quickly: jitteriness, a racing heart, anxiety, and trouble sleeping are the common warning signs. If you notice those, ease off and give your body a few caffeine-light days. Everyone's tolerance is different, and it tends to drift higher the more regularly you drink coffee.\n\n**Q: I'm pregnant — do I need to give up coffee entirely?**\n\nNot necessarily, but the common guidance is to keep caffeine under about 200 mg per day during pregnancy. That's roughly two standard 8 oz cups of drip coffee, though you'll want to account for caffeine from tea, chocolate, soft drinks, and energy drinks too, since it all adds together. As always, your own doctor's advice comes first.\n\n**Q: Does caffeine hide in foods I wouldn't expect?**\n\nDefinitely. Chocolate, many teas, some sodas, energy drinks, and even certain pain relievers and supplements contain caffeine. If you're trying to stay under a daily limit, those extras count just as much as your coffee does. Decaf isn't entirely caffeine-free either, though it has only a small fraction of the regular amount.\n\n**Q: Is coffee actually good for me, or is that just wishful thinking?**\n\nThe research is genuinely encouraging, but it's important to be precise about what it shows. Studies that follow large groups of people over time have found that drinking 3-4 cups a day is associated with a lower risk of type 2 diabetes and Parkinson's disease. The key word is \"associated with.\" These are observations of patterns across populations — they do not prove that coffee prevents those conditions. People who drink moderate coffee may differ in other ways too, and association is not the same as cause.\n\n**Q: Why can't we just say coffee prevents disease, then?**\n\nBecause association studies can't separate coffee from everything else about a person's life. To show that coffee directly causes a lower risk, you'd need controlled trials, and those are hard to run for decades. So the honest summary is: moderate coffee drinking is linked to some good outcomes, the signal is consistent enough to be interesting, but \"linked to\" is as far as the evidence takes us. Don't start drinking coffee purely as medicine.\n\n**Q: Does coffee dehydrate me?**\n\nCaffeine is a mild diuretic, so it can nudge you toward the bathroom a little sooner. But the water in a cup of coffee more than makes up for it, so your daily coffee still counts toward your fluid intake. For most people, normal coffee drinking does not cause dehydration.\n\n**Q: Will coffee stunt my growth?**\n\nThat's an old myth with no good evidence behind it. Caffeine doesn't shrink anyone. The kernel of truth is that caffeine late in the day can disrupt sleep, and growing kids and teens need plenty of sleep — so the sensible advice for young people is about sleep, not height.\n\n**Q: Why does coffee sometimes upset my stomach?**\n\nCoffee is naturally acidic and can stimulate stomach activity, which a sensitive stomach may not love, especially on an empty one. If that's you, try eating something alongside your coffee, switching to a darker or cold-brewed coffee (both tend to be gentler), or simply cutting back. It's about your individual gut, not a flaw in the coffee.\n\n**Q: Can I build up a tolerance to caffeine?**\n\nYes. With regular intake, your body makes more adenosine receptors, so the same dose has less effect over time and you may need a bit more for the same lift. The flip side is dependence: skip your usual coffee and you might get a withdrawal headache, fatigue, or irritability for a day or two. It passes, and tapering down slowly makes it much easier than quitting cold.\n\n**Q: When should I stop drinking coffee so it doesn't wreck my sleep?**\n\nBecause the half-life is about 5 hours, a cup in the late afternoon can still have meaningful caffeine in your system at bedtime. A good rule of thumb is to have your last full-strength coffee at least six to eight hours before you plan to sleep. If you're a slow metabolizer, push that even earlier, or switch to decaf for the evening.\n\n**Q: Is decaf a reasonable substitute?**\n\nFor the flavor and ritual of coffee without much of the kick, yes. Decaf keeps most of the taste while removing the large majority of the caffeine, so it's a great option later in the day or for anyone cutting back. Just remember \"decaffeinated\" doesn't mean \"zero caffeine\" — there's still a trace.\n\n**Q: What's the single most important thing to take away from all this?**\n\nModeration and timing. Caffeine is a tool: it blocks adenosine to mask tiredness, it lasts longer than most people expect, and the benefits the research points to all show up at moderate intake. Enjoy your coffee, respect the clock, stay under sensible limits, and let it be a pleasure rather than a crutch.\n"},"raw/cold-brew-notes.md":{"id":"raw/cold-brew-notes.md","key":"raw/cold-brew-notes.md","title":"Cold Brew — bench notes (R&D log)","model":"claude:sonnet","cited_by":["concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/cold-brew.md"],"missing":false,"kind":"text","href":"../raw/cold-brew-notes.md","truncated":false,"snippet":"Notebook: Bench 3, immersion rig. All readings on the Hadley-Roe refractometer (cal'd weekly). Default house bean: Cordwell Roastworks \"Slow Tide\" medium roast unless noted. --- 2026-02-11 — first pass, immersion. - grind: COARSE. sea-salt-","body":"# Cold Brew — bench notes (R&D log)\n\nNotebook: Bench 3, immersion rig. All readings on the Hadley-Roe refractometer (cal'd weekly).\nDefault house bean: Cordwell Roastworks \"Slow Tide\" medium roast unless noted.\n\n---\n\n2026-02-11 — first pass, immersion.\n- grind: COARSE. sea-salt-ish, ~1100-1200 micron. burr set 9.5 on the Vossberg.\n- ratio: 1:8 concentrate (250 g grounds / 2000 g water).\n- water: filtered, 22 C room temp. Total Dissolved Solids (TDS) in ~38 ppm.\n- steep: 16 h, lid on, no stir after t=0.\n- screen + paper filter on draw-off. slow, ~8 min gravity.\n- concentrate TDS: 4.1%. tastes intense, choc/raisin, low acid.\n- dilute 1:3 (conc:water) for cupping. final TDS ~1.05%. smooth. way less sour than hot drip.\n\n2026-02-12 — note to self.\n- coarse grind matters. fines = silty cup + over-extraction during long steep.\n- 12-18 h is the working window. <12 = thin/sour, >18 = woody.\n\n2026-02-14 — temp split test.\n- A: room temp 22 C, 14 h.\n- B: fridge 4 C, 14 h.\n- fridge run reads LOWER conc TDS (3.6% vs 4.0% room). slower extraction cold.\n- to match, fridge wants 18 h. room can stop ~14.\n- flavor: fridge = cleaner, brighter. room = rounder, heavier body.\n\n2026-02-15 — ratio sanity.\n- target brewing strength = ~1:8 grounds:water for the CONCENTRATE.\n- then DILUTE to taste. typical serve 1:1 up to 1:3 with water or milk + ice.\n- 1:8 is the anchor number. everything dilutes down from there.\n\n2026-02-18 — caffeine, the big one.\n- KEY: cold brew often ends up HIGHER total caffeine than hot drip. counterintuitive.\n- reason: huge grounds-to-water ratio (~1:8) + the 12-18 h steep. long contact pulls a LOT.\n- the \"cold = less caffeine\" thing is a myth. it's about the concentrate, not the temp.\n- caveat: people DILUTE it, so a finished glass varies. but per gram of grounds used,\n  cold brew is loaded.\n- bench number we're quoting internally: a 1:8 concentrate runs ~2.5x the caffeine of a\n  standard hot drip mug, before dilution.\n\n2026-02-19 — half-life note (physiology, for the menu cards).\n- caffeine half-life in the body: about 3 hours.\n- so a big afternoon cold brew lingers. flag on the \"after 2pm\" decaf upsell.\n\n2026-02-21 — extraction yield check.\n- EY = (TDS% x beverage mass) / dry grounds mass.\n- room 14 h run: conc TDS 4.0%, draw-off 1820 g, grounds 250 g.\n- EY ~= (0.040 x 1820) / 250 = 29.1%. high but the long steep gets there gently, no bitterness.\n- hot drip on same bean lands EY ~20%. cold pulls more total solubles over time.\n\n2026-02-22 — filter notes.\n- paper after the screen kills the silt. cup goes glassy clear.\n- nylon-only = more body but cloudy + sediment at the bottom of the keg.\n- house spec: SS screen draw-off, then single paper polish. don't skip.\n\n2026-02-24 — water redo.\n- bumped TDS to 60 ppm (added Brewmaster's mineral sachet).\n- conc TDS up a touch, 4.2%. sweeter, more defined. acid still low.\n- too soft water (<30 ppm) = flat, hollow. mineral helps.\n\n2026-02-26 — grind regrind.\n- tried medium-coarse (burr 8). conc went silty + slightly astringent at 16 h.\n- back to 9.5. coarse is non-negotiable for the long steep.\n\n2026-03-01 — batch scale-up.\n- 5 kg grounds / 40 kg water = 1:8 again. 18 h room temp (cold kitchen, 19 C).\n- conc TDS 4.0%. consistent w/ small batch. good.\n- yield off the press ~36 L concentrate.\n\n2026-03-04 — shelf life.\n- concentrate, sealed, fridge: good ~10-14 days. acidity creeps up after.\n- diluted/ready-to-drink: 2-3 days max. flavor drops fast.\n\n2026-03-06 — milk service.\n- 1:1 conc:whole milk over ice = the seller. body carries.\n- oat works, almond goes thin. spec oat as default alt.\n\n2026-03-09 — A/B vs nitro tap.\n- same conc, charged N2. creamier mouthfeel, perceived sweeter, caffeine unchanged obv.\n- TDS identical, ~4.0%. it's texture not extraction.\n\n2026-03-11 — recap card for new staff:\n- COARSE grind.\n- STEEP 12-18 h (room temp OR fridge — fridge wants the longer end).\n- 1:8 concentrate, then DILUTE to taste.\n- smoother + less acidic than hot.\n- HIGHER total caffeine than hot drip (myth-buster — say it at the bar).\n- caffeine half-life ~3 h — don't sell the triple after 3pm.\n\n2026-03-12 — open Qs.\n- does a t=8h stir lift EY without silt? test next week.\n- map conc TDS vs steep hours, 10/12/14/16/18, single curve.\n- decaf cold brew line — same method, confirm low residual.\n\n2026-03-14 — stir test result.\n- single gentle stir at t=8 h. conc TDS 4.3% vs 4.0% control. slight bump, no astringency.\n- adopt for batch only (small batch not worth the labor).\n\n2026-03-17 — steep curve, room 22 C, 1:8.\n- 10 h: 3.1%\n- 12 h: 3.5%\n- 14 h: 4.0%\n- 16 h: 4.1%\n- 18 h: 4.2%\n- plateau after ~16 h. diminishing returns + woody risk past 18.\n\n2026-03-19 — close-out for the quarter.\n- house cold brew SPEC LOCKED:\n  - grind coarse (burr 9.5), 1:8, room temp 14-16 h or fridge 18 h.\n  - SS screen + paper. mineral water ~60 ppm.\n  - conc TDS target 4.0-4.2%. serve diluted 1:2 default.\n- remember the two talking points: lower acid, higher caffeine. both true. both sell.\n"},"raw/espresso-and-cafe-culture.md":{"id":"raw/espresso-and-cafe-culture.md","key":"raw/espresso-and-cafe-culture.md","title":"The Bar at the Edge of Morning","model":"claude:sonnet","cited_by":["concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/espresso.md","objects/aurora-midnight.md","organizations/caffe-aurora.md","persons/lina-marchetti.md"],"missing":false,"kind":"text","href":"../raw/espresso-and-cafe-culture.md","truncated":false,"snippet":"There is a sound a city makes before it admits to being awake, and in the coffee towns of the Adriatic it begins with a hiss. Not the hiss of traffic or of rain, but the deliberate, mechanical sigh of a group head clearing its throat, steam","body":"# The Bar at the Edge of Morning\n\nThere is a sound a city makes before it admits to being awake, and in the\ncoffee towns of the Adriatic it begins with a hiss. Not the hiss of traffic\nor of rain, but the deliberate, mechanical sigh of a group head clearing its\nthroat, steam pressed through brass and chrome, a machine that has been kept\nwarm all night and now stretches like a cat in a doorway. If you have ever\nstood at a proper espresso bar in the gray of an Italian dawn, shoulder to\nshoulder with men in work coats and women with their collars turned up, you\nknow that the drink is almost an afterthought. The ritual is the thing. The\ndrink is merely the proof that the ritual was performed correctly.\n\nConsider what is actually happening inside that machine, because the romance\nof it is built on something almost violent. Espresso is made by forcing hot\nwater through a compact bed of very finely ground coffee at roughly nine bars\nof pressure — nine times the weight of the whole atmosphere bearing down on a\nspoonful of grounds, squeezed into a few seconds of effort. It is not a gentle\nextraction. It is a controlled emergency. The barista tamps the grounds flat\nand level, locks the portafilter into the group with a quarter turn and a\npracticed thump, and starts the pump, and for the next twenty-five to thirty\nseconds the whole business hangs in the balance. Pull it too fast and the cup\nis thin and sour; too slow and it turns bitter and scorched. The window is\nnarrow, and a good barista learns to read it the way a sailor reads weather.\n\nThe numbers, once you know them, have the tidy satisfaction of a recipe handed\ndown rather than written down. A typical double shot begins with about\neighteen grams of ground coffee packed into the basket, and from that the\nmachine coaxes about thirty-six grams of liquid into the waiting cup — roughly\na doubling of weight, water taking on body and color and oil as it passes\nthrough. The pour starts pale and quickens to the color of dark honey, then\ndeepens, and across the top of it settles the crema, that fragile reddish-brown\nfoam of emulsified oils and dissolved gas that is the visible signature of the\npressure that made it. The crema is the machine's handwriting. An old hand can\nglance at it and tell you whether the grind was right, whether the tamp was\neven, whether the morning is going to behave.\n\nPeople worry about the caffeine, and they are mostly worrying about the wrong\nthing. A single shot — call it one ounce — carries about sixty-three milligrams\nof caffeine, which is less than most people assume and far less than the\nbrimming American mug that keeps the office running. The espresso simply\ndelivers it differently: concentrated, sudden, gone in three swallows. You do\nnot nurse an espresso. You stand, you drink, you set the cup down on the saucer\nwith a small ceramic click, and you leave a coin and you go. The whole\ntransaction can be over in ninety seconds, and yet people remember a good one\nfor years, the way they remember a particular afternoon of light.\n\nI think often of Lina Marchetti when I think about all this, because she is the\nperson who taught me that the bar is a kind of theater and the barista is both\nactor and audience. Lina was a barista in Trieste, that strange and beautiful\nborder city where Italy frays into the rest of Europe and the wind comes down\noff the karst hard enough to lean against. She had grown up in the steam of\nthose cafés, the kind where the marble counter is worn into a shallow trough by\na century of elbows, and she understood the machine the way some people\nunderstand a horse — by feel, by listening, by the small corrections you make\nbefore you can consciously say why.\n\nIt was Lina Marchetti who founded the café chain Caffe Aurora, and she founded\nit in 1987, against the advice of nearly everyone she knew. The story, as she\ntold it, was unglamorous. She was tired of working behind other people's\ncounters, tired of serving other people's blends, and she had an idea — almost\nheretical at the time — that the discipline of a single great bar could be\ntaught, repeated, carried from one city to the next without being cheapened.\nHer friends told her that espresso did not travel, that the magic was local and\ncould not be franchised, that the moment she opened a second location the soul\nwould leak out of the first. She opened the second one anyway. Then a third.\n\nWhat held the thing together, in those early years, was not a logo or a\nmarketing budget but a stubborn insistence on the same eighteen grams, the same\nnine bars, the same patient count to thirty, in every Aurora bar from the first\ncramped room near the old harbor to the ones that came later. Lina trained her\nbaristas the way a conductor trains an orchestra, which is to say relentlessly\nand with great affection, and she had a habit of appearing without warning to\npull a shot herself, taste it, and say nothing at all — which everyone agreed\nwas far more frightening than criticism.\n\nThe house had a signature dark roast that she named Aurora Midnight, and it\nbecame the thing the chain was known for: a roast taken deep, almost to the\nedge of bitterness but pulled back at the last instant, oily and low and\nresonant, the kind of coffee that tastes like the inside of a cello sounds. She\nused to say that a roast should have a horizon in it, a line where the light\ngoes, and Aurora Midnight was her attempt to bottle the moment just after dusk.\nI am not qualified to say whether she succeeded, only that the regulars would\nqueue for it in weather that would have kept a sensible person indoors.\n\nBut the roast, for all its fame, was never really the point, and Lina knew it.\nThe point was the bar itself — the social machine, not the brass one. An\nespresso bar at its best is a leveling place. The lawyer and the bricklayer\nstand at the same counter and drink the same drink at the same price, and for\nthe length of one short cup they are equals in a small democracy of steam.\nThere is no table service to separate them into castes, no laptops colonizing\nthe surfaces, no names called out over a crowd. There is the counter, the\nmachine, the barista who remembers how you take it, and the brief warm\nparenthesis the whole thing carves out of the day.\n\nI have come to believe that this is what people are really buying when they buy\nan espresso, and what Lina Marchetti was really selling when she built Caffe\nAurora out of one tired woman's refusal to keep serving other people's coffee.\nNot the caffeine, not even the flavor, but the punctuation. A full stop in the\nsentence of the morning. A reason to stop walking and stand still for a\nminute and be, briefly, somewhere rather than on the way to somewhere.\n\nThe machine hisses again. Somewhere a portafilter knocks its spent puck into\nthe bin with two flat raps, that percussive grace note that ends every\nperformance. The grind whirs. The barista glances at the crema, judges it in a\nquarter of a second, slides the cup across the marble. Twenty-five seconds,\nmaybe thirty. Eighteen grams in, thirty-six out, nine bars of pressure and a\nhundred years of habit. Outside the city is finally, properly awake, and inside\nthe small bright cave of the bar the morning is being performed again, exactly\nas it was yesterday, exactly as it will be tomorrow, one short ceremony at a\ntime.\n"},"raw/matcha-and-preparation.md":{"id":"raw/matcha-and-preparation.md","key":"raw/matcha-and-preparation.md","title":"How to Whisk Matcha at Home","model":"claude:sonnet","cited_by":["concepts/matcha.md"],"missing":false,"kind":"text","href":"../raw/matcha-and-preparation.md","truncated":false,"snippet":"Matcha is simply green tea that has been dried and milled into a fine powder. The thing that makes it different from a cup of loose-leaf sencha is that you do not steep it and throw the leaf away. You whisk the powder directly into hot wate","body":"# How to Whisk Matcha at Home\n\nMatcha is simply green tea that has been dried and milled into a fine powder. The thing that makes it different from a cup of loose-leaf sencha is that you do not steep it and throw the leaf away. You whisk the powder directly into hot water and drink the whole leaf, suspended in the cup. Because you are swallowing the entire ground leaf rather than just an infusion, a single serving carries more caffeine than the same weight of steeped green tea — count on about 60-70 mg per bowl, roughly what you would get from a modest cup of brewed coffee but with a slower, steadier lift.\n\nIt is worth saying plainly, because people are often surprised: matcha is the same plant as every other green or black tea, *Camellia sinensis*. It is just shade-grown for a few weeks before harvest and then stone-ground after drying. The shade pushes the leaf to make more chlorophyll and more of the amino acids that give matcha its sweet, savory edge; the stone mill turns it into the talc-fine powder you whisk. Same plant, different growing and finishing.\n\n## Pick the Right Grade First\n\nBefore you buy anything, understand that matcha comes in grades, and the grade decides what you should do with it. There are two you need to know.\n\n**Ceremonial grade** is made from the youngest, tenderest spring leaves, stone-ground slowly so the powder stays cool and fine. It is a bright, almost electric jade green. This is the grade you whisk plain with nothing but water — it is smooth, sweet, and has very little of the harsh bitterness that scares people off. If you are drinking matcha straight, buy ceremonial.\n\n**Culinary grade** is made from later harvests and slightly coarser leaf. It is a duller, more olive-toned green and it tastes stronger and more astringent. That sounds like a downgrade, but it is exactly what you want when the matcha has to fight through milk, sugar, ice, or batter. Use culinary grade for lattes, smoothies, ice cream, and baking, where you need the flavor to carry. Buying ceremonial grade for a sweetened iced latte is a waste of money; buying culinary grade to whisk plain will leave you wondering why everyone likes this stuff.\n\nA quick way to judge at the shop: look at the color. Vivid, saturated green means a higher grade and a fresher milling. Yellowish, brownish, or grey-green powder is old, oxidized, or low quality — skip it.\n\n## What You Need\n\n- 1 to 2 grams of matcha (about half a teaspoon to a slightly heaped teaspoon)\n- Hot water, **not boiling** — see the temperature note below\n- A bamboo whisk (a *chasen*) if you have one; a small metal milk frother or a fork will do in a pinch\n- A wide bowl or a mug with a flat bottom\n- A small fine-mesh sieve\n\n## The One Rule About Temperature\n\nDo not pour boiling water on matcha. Green tea in general, and matcha especially, turns bitter and flat if the water is too hot. Aim for **about 70-80 C**. Boiling water scorches the fine powder and pulls out the harsh, vegetal bitterness instead of the sweetness.\n\nIf you do not have a thermometer, boil the kettle and then let it sit and cool for two to three minutes, or pour the hot water into your serving bowl first to take the edge off, then tip it into a second vessel. Both tricks land you in the right window. Cooler is safer than hotter here — a slightly under-temperature bowl is still pleasant, while an over-temperature one is ruined.\n\n## Step by Step: Usucha (Thin Matcha)\n\nThis is the everyday, drink-it-plain method. Use ceremonial grade.\n\n1. **Warm and dry your bowl.** Rinse the bowl with hot water, swirl it, and pour it out. A warm bowl keeps the matcha from cooling too fast. Dry the inside so the powder does not clump on contact.\n\n2. **Sift the matcha.** Measure 1 to 2 grams into the sieve and tap it through into the bowl. Do not skip this. Matcha clumps badly, and any lump you leave now becomes a chalky bead you cannot whisk out later. Sifting is the single biggest difference between a smooth bowl and a gritty one.\n\n3. **Add a little water first.** Pour in just a splash of your 70-80 C water — maybe 15 to 20 ml, enough to wet the powder into a paste. Working a paste first lets you crush out the last clumps before you commit the full volume.\n\n4. **Make the paste smooth.** With the back of your whisk or a spoon, press the powder and water against the bottom of the bowl until it is a glossy, lump-free paste. Take five seconds; it pays off.\n\n5. **Top up with water.** Add the rest of your water, about 60 to 70 ml total for a single bowl. You want enough to whisk freely but not so much that the bowl is full to the brim.\n\n6. **Whisk in a zig-zag.** Hold the whisk lightly and move it briskly back and forth in a straight line — a **zig-zag** or \"W\"/\"M\" motion across the surface, not a round stirring motion. Keep your wrist loose and your forearm doing the work. Circular stirring just pushes the powder around; the fast zig-zag is what whips air in.\n\n7. **Whisk to a froth.** Keep going for 15 to 20 seconds until a fine, pale foam covers the whole surface with small even bubbles. When you have a soft, milky froth, lift the whisk straight up through the center to settle the surface.\n\n8. **Drink it fresh.** Matcha does not hold. The powder settles within a minute or two, so drink it while the foam is up and the bowl is warm. Give it a quick swirl near the end so you finish the leaf at the bottom.\n\n## Making a Matcha Latte\n\nSwitch to culinary grade for this — you need the stronger flavor to survive the milk.\n\n1. Sift 2 grams of culinary matcha into a mug.\n2. Add a splash of 70-80 C water and whisk to a smooth, frothy concentrate using the same zig-zag motion.\n3. Heat and froth your milk separately — dairy or oat both work well.\n4. Pour the milk over the matcha concentrate. For iced, pour the concentrate over ice and cold milk instead.\n5. Sweeten to taste. A little honey or simple syrup balances the astringency of culinary grade nicely.\n\n## Common Fixes\n\n- **Gritty or lumpy bowl:** you skipped the sieve, or your water was added all at once. Sift, and always make the paste first.\n- **Bitter, harsh flavor:** your water was too hot. Pull it back toward the cooler end of 70-80 C, and double-check you are not using a tired, yellowed powder.\n- **No froth:** you are stirring in circles instead of the fast straight zig-zag, or you used too much water for the amount of powder. Loosen your wrist and speed up.\n- **Weak, watery taste in a latte:** you used ceremonial grade where culinary would have carried better, or you under-dosed the powder. Go up to a full 2 grams.\n\n## Storing It\n\nMatcha is fragile. Light, heat, air, and moisture all dull that bright green and flatten the flavor within weeks. Keep the tin sealed, in the dark, somewhere cool, and use it up within a month or two of opening. If your beautiful jade powder has gone dull and hay-colored, it has oxidized — it is still safe, but it will taste flat, and no amount of careful whisking brings it back.\n"},"raw/tea-guide.md":{"id":"raw/tea-guide.md","key":"raw/tea-guide.md","title":"A Reference Guide to Tea","model":"claude:sonnet","cited_by":["concepts/caffeine-in-tea.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"missing":false,"kind":"text","href":"../raw/tea-guide.md","truncated":false,"snippet":"Tea is one of the most widely consumed beverages on the planet, second only to water in total volume drunk each day. Despite the enormous variety of products sold under the name, the word \"tea\" in its strict sense refers to an infusion prep","body":"# A Reference Guide to Tea\n\nTea is one of the most widely consumed beverages on the planet, second only to\nwater in total volume drunk each day. Despite the enormous variety of products\nsold under the name, the word \"tea\" in its strict sense refers to an infusion\nprepared from the leaves of a single plant species. This article surveys the\nbotany, history, principal types, preparation, and chemistry of tea, with an\nemphasis on the distinctions that matter to both producers and drinkers.\n\n## One Plant, Many Teas\n\nAll true tea comes from one plant, *Camellia sinensis*, an evergreen shrub\nnative to the highlands of East and South Asia. Beverages brewed from other\nplants, such as rooibos, chamomile, peppermint, or hibiscus, are properly called\nherbal infusions or tisanes; they are not tea in the botanical sense, however\nmuch they may resemble it in the cup.\n\nWhat distinguishes white, green, oolong, black, and pu-erh tea from one another\nis not the species of plant but the way the harvested leaf is treated after\npicking. The single most important variable is oxidation, the enzymatic process\nthat begins when the leaf cell walls are bruised or broken and the plant's\nnatural compounds react with oxygen in the air. By controlling how far this\nreaction is allowed to proceed before it is halted by heat, a maker can turn the\nsame fresh leaf into radically different products.\n\nThe broad families fall along the oxidation spectrum as follows:\n\n- **White and green teas** undergo little oxidation. White tea is barely\n  handled at all, simply withered and dried, while green tea is heated early,\n  by steaming or pan-firing, to deactivate the oxidising enzymes and lock in a\n  fresh, grassy character.\n- **Oolong tea** is partially oxidized, occupying a wide middle ground. Lightly\n  oxidised oolongs taste floral and close to green tea, while heavily oxidised\n  ones approach the depth of black tea.\n- **Black tea** is fully oxidized, which develops its dark colour, brisk body,\n  and robust flavour. In much of East Asia this category is known as \"red tea\"\n  after the colour of the liquor rather than the dry leaf.\n- **Pu-erh tea** is fermented and aged. Unlike the enzymatic oxidation of black\n  tea, pu-erh undergoes microbial fermentation over months or years, producing\n  an earthy, mellow brew that is often pressed into cakes and stored to mature.\n\n## A Short History\n\nTea originated in China, where its cultivation and consumption can be traced\nacross several thousand years of recorded and semi-legendary history. According\nto legend, the beverage was discovered by the Emperor Shennong in 2737 BCE,\nwhen leaves from a wild tea shrub are said to have drifted into a pot of water\nhe was boiling. Charmed by the aroma and the reviving effect of the resulting\ninfusion, the emperor is reputed to have championed the drink. The story is\ntraditional rather than documented, but it captures the antiquity that the\nChinese themselves have long ascribed to tea.\n\nFrom China the practice spread outward along trade and religious routes. Tea\ntravelled to Japan with Buddhist monks, who carried both the leaves and the\ndisciplined ritual of preparing them, eventually giving rise to the celebrated\nJapanese tea ceremony. For many centuries tea remained an essentially Asian\nbeverage. It reached Europe only in the 17th century, brought by maritime\ntraders, after which it rapidly became a fashionable and then an everyday drink\nacross much of the continent and, later, its colonies.\n\n## Growing and Harvesting\n\n*Camellia sinensis* thrives in warm, humid climates with ample rainfall and\ngood drainage, and many of the finest teas are grown at altitude, where cool\nnights slow the leaf's growth and concentrate flavour. The plant is kept pruned\nto a low bush for ease of plucking. The most prized harvest is the \"flush\" of\nyoung shoots, typically the bud and the two leaves immediately below it, which\ncontain the highest proportion of the compounds responsible for aroma and\nbriskness.\n\nTwo principal varieties dominate cultivation. The China variety is a smaller,\nhardier plant suited to cooler highland conditions, while the Assam variety,\nnative to South Asia, is larger-leaved and favours hot, lowland tropics. Most\ncommercial teas derive from one of these two or from hybrids between them.\n\n## Brewing Temperature and Method\n\nFew factors affect the quality of a finished cup more than water temperature.\nBecause the delicate compounds in lightly processed leaves scorch easily, green\ntea should be brewed with water that is well below boiling, at about 70 to 80\ndegrees Celsius. Water that is too hot strips green tea of its sweetness and\ndraws out a harsh bitterness instead.\n\nBlack tea, by contrast, demands much hotter water, about 95 to 100 degrees\nCelsius, very near a full boil. Only at this temperature do the fully oxidised\nleaves release their full colour, body, and flavour. Oolong and white teas sit\nbetween these extremes, and pu-erh is generally brewed hot, often after a brief\nrinse of the leaves.\n\nSteeping time matters as well: shorter steeps preserve subtlety, while longer\nsteeps extract more strength and, eventually, more astringency. As a rule, the\nleaf may be judged by both its colour in the cup and the balance of sweetness\nagainst bitterness on the palate.\n\n## Comparison of the Major Types\n\nThe table below summarises the defining attributes of the principal tea\nfamilies, including their place on the oxidation scale, recommended brewing\ntemperature, and the approximate caffeine content of a standard cup.\n\n| Type    | Oxidation        | Brew Temp (°C) | Caffeine (per cup) |\n|---------|------------------|----------------|--------------------|\n| White   | Very little      | 75–85          | ~30–55 mg          |\n| Green   | Little           | 70–80          | ~28 mg             |\n| Oolong  | Partial          | 85–95          | ~37 mg             |\n| Black   | Full             | 95–100         | ~47 mg             |\n| Pu-erh  | Fermented / aged | 95–100         | ~40 mg             |\n\n## Caffeine\n\nLike coffee and cocoa, tea naturally contains caffeine, the stimulant\nresponsible for much of its reviving reputation. The amount in a finished cup\ndepends on the type of tea, the quantity of leaf used, the water temperature,\nand the length of the steep, but useful averages can be given.\n\nA cup of black tea contains about 47 mg of caffeine, while a cup of green tea\ncontains about 28 mg. The lower figure for green tea reflects both its cooler\nbrewing water and its shorter typical steep rather than any fundamental shortage\nof caffeine in the leaf itself.\n\nA common misconception deserves correction here: white tea does contain\ncaffeine, roughly 30 to 55 mg per cup. Being the least processed of the teas\ndoes not render it caffeine-free. In fact, because white tea is made from very\nyoung buds, which are rich in the compound, its caffeine content can rival or\nexceed that of some green and even black teas. Anyone seeking to avoid caffeine\nentirely should choose a genuine herbal infusion rather than any product of the\ntea plant.\n\n## Antioxidants and Other Compounds\n\nBeyond caffeine, the tea leaf is chemically rich, and much of its reputation as\na healthful drink rests on its content of antioxidants. Tea is a notable source\nof catechins, a family of plant antioxidants of which the most studied is\nepigallocatechin gallate (EGCG). Catechins are most abundant\nin the less oxidised teas, since oxidation converts many of them into other\ncompounds; this is one reason green tea is so often singled out for its supposed\nbenefits.\n\nTea also contains tannins, the astringent compounds that lend the brew its\ncharacteristic dryness and grip on the palate and that contribute to the colour\nof darker infusions. Tannins bind readily with proteins and with iron, which is\nwhy tea can taste smoother when softened with milk and why very strong tea is\nsometimes discouraged alongside iron-rich meals.\n\nThe leaf further supplies small amounts of vitamins, minerals, and aromatic\noils. The interplay of caffeine, catechins, and tannins gives each style of tea\nits particular balance of\nstimulation, sweetness, and astringency.\n\n## Storage\n\nTea is best kept away from its four great enemies: light, heat, moisture, and\nstrong odours. Most green and black teas are at their best within a year or two\nof production and should be stored in
