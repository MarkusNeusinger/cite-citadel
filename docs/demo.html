<script id="bundle" type="application/json">{"wiki_name":"wiki","pages":[{"rel_path":"abbreviations/ey-extraction-yield.md","type":"Abbreviation","title":"EY — Extraction Yield","description":"The percentage of the ground coffee's dry mass dissolved into the brewed cup, used alongside TDS to evaluate brewing recipes.","tags":["coffee","brewing","measurement"],"body":"\nExtraction Yield (EY) is calculated alongside total dissolved solids ([TDS](tds-total-dissolved-solids.md)) so a given grind and ratio can be compared objectively rather than by taste alone.[^s1][^llm1]\n\n## See also\n\n- [Brewing ratios](../concepts/brewing-ratios.md)\n- [TDS — Total Dissolved Solids](tds-total-dissolved-solids.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^llm1]: LLM - model knowledge, not from a raw file (added 2026-07-01)\n","outbound":["abbreviations/tds-total-dissolved-solids.md","concepts/brewing-ratios.md"],"inbound":["abbreviations/tds-total-dissolved-solids.md","concepts/brewing-ratios.md","concepts/cold-brew.md"]},{"rel_path":"abbreviations/tds-total-dissolved-solids.md","type":"Abbreviation","title":"TDS — Total Dissolved Solids","description":"A measure of brew strength — the proportion of dissolved coffee solids in a finished cup.","tags":["coffee","brewing","measurement"],"body":"\nTotal Dissolved Solids (TDS) is the measure [coffee](../concepts/coffee.md) enthusiasts use to express a [brewing](../concepts/brewing-ratios.md) recipe's strength objectively, alongside the [extraction yield (EY)](ey-extraction-yield.md), rather than relying on taste alone.[^s1][^llm1]\n\n## See also\n\n- [Brewing ratios](../concepts/brewing-ratios.md)\n- [EY — Extraction Yield](ey-extraction-yield.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^llm1]: LLM - model knowledge, not from a raw file (added 2026-07-01)\n","outbound":["abbreviations/ey-extraction-yield.md","concepts/brewing-ratios.md","concepts/coffee.md"],"inbound":["abbreviations/ey-extraction-yield.md","concepts/brewing-ratios.md","concepts/cold-brew.md"]},{"rel_path":"concepts/arabica-and-robusta.md","type":"Concept","title":"Arabica and Robusta","description":"The two coffee species that account for nearly all commercial production, contrasted by growing conditions, flavor, and caffeine content.","tags":["coffee","botany","species"],"body":"\nTwo species account for essentially all commercial [coffee](coffee.md) production: *Coffea arabica*, almost always called simply Arabica, and *Coffea canephora*, universally known by its trade name Robusta.[^s1]\n\n## Arabica\n\nArabica is the dominant species in the global market, supplying roughly 60 to 70 percent of world production.[^s1] It is generally grown at higher altitudes, where cooler temperatures slow the maturation of the cherry and allow more complex sugars and aromatic compounds to develop, producing a cup regarded as sweeter, more nuanced, and more layered in flavor — often described as floral, fruity, or chocolate-like.[^s1] Arabica plants are comparatively delicate: sensitive to temperature swings, vulnerable to pests, and especially susceptible to coffee leaf rust, a fungal disease that has historically devastated entire growing regions.[^s1]\n\n## Robusta\n\nRobusta is a hardier plant that thrives at lower elevations and in warmer, more humid climates than Arabica can tolerate; it is more resistant to disease and pests, more forgiving of difficult growing conditions, and capable of a higher yield per plant, which makes it cheaper to cultivate.[^s1] In the cup, Robusta is generally described as harsher and more bitter, with an earthy or woody character and a heavier body.[^s1] It contains about twice the [caffeine](caffeine-in-coffee.md) of Arabica, a difference that contributes both to its more aggressive taste and to its natural resistance to insects, since caffeine acts as a chemical deterrent in the plant.[^s1][^s2] Robusta is widely used in instant coffee and in espresso blends, where it lends body and a thick, stable layer of crema.[^s1][^s2]\n\n## Comparison\n\n| Trait | Arabica | Robusta |\n| --- | --- | --- |\n| Share of world production | ~60-70% | remainder |\n| Growing altitude | Higher | Lower |\n| Hardiness / disease resistance | Lower | Higher |\n| Yield | Lower | Higher |\n| Caffeine content | Baseline | ~2x that of Arabica |\n| Typical flavor | Sweeter, more complex | Harsher, more bitter |\n\nThis table summarizes the principal contrasts between the two species.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Caffeine and health](caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^s2]: [raw/coffee-health-faq.md](../../raw/coffee-health-faq.md) — coffee and caffeine health FAQ (ingested 2026-07-01)\n","outbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee.md"],"inbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee-history-and-trade.md","concepts/coffee.md","concepts/tea-growing-and-harvesting.md"]},{"rel_path":"concepts/aurora-ritual.md","type":"Concept","title":"Aurora Ritual","description":"Caffe Aurora's three-step ceremony for drinking a cup of coffee — smell, taste plain, then customize.","tags":["coffee","ritual","tasting"],"body":"\nThe Aurora Ritual is a three-step ceremony that [Caffe Aurora](../organizations/caffe-aurora.md) teaches its customers for drinking a cup of [coffee](../concepts/coffee.md).[^s1]\n\n1. **Smell it first.** Before the first sip, lift the cup and breathe in twice to catch aromas that would not come through by taste alone.[^s1]\n2. **The first sip is for the bean.** Taste the coffee plain — no sugar, no milk — to meet it as it is.[^s1]\n3. **Then make it yours.** Only after the first plain sip, add sugar, milk, or other additions to taste.[^s1]\n\n## See also\n\n- [Caffe Aurora](../organizations/caffe-aurora.md)\n\n## Sources\n\n[^s1]: [raw/aurora-coffee-blog.md](../../raw/aurora-coffee-blog.md) — Caffe Aurora company blog post (ingested 2026-07-01)\n","outbound":["concepts/coffee.md","organizations/caffe-aurora.md"],"inbound":["concepts/espresso.md","organizations/caffe-aurora.md"]},{"rel_path":"concepts/brewing-ratios.md","type":"Concept","title":"Brewing Ratios","description":"How coffee-to-water ratio, grind size, and contact time determine the strength and balance of brewed coffee.","tags":["coffee","brewing"],"body":"\nBrewing extracts the soluble compounds of ground [coffee](coffee.md) into water.[^s1] The ratio of coffee to water is one of the most important variables in determining strength and balance; a typical brew ratio is about 1:15 to 1:18 by weight, meaning roughly one gram of ground coffee for every 15 to 18 grams of water.[^s1] A higher proportion of coffee yields a stronger, more concentrated cup, while a higher proportion of water yields a lighter, more diluted one.[^s1]\n\nGrind size, water temperature, and contact time also shape the result: finer grinds and longer contact times increase extraction, while coarser grinds and shorter contact times reduce it.[^s1] Different brewing devices, from drip machines and pour-over cones to French presses and espresso machines, are matched to particular grind sizes and ratios.[^s1] [Espresso](espresso.md) sits at the concentrated extreme: a typical double shot uses about eighteen grams of coffee to draw about thirty-six grams of liquid — roughly 1:2 by weight — in twenty-five to thirty seconds, far more concentrated and quick than drip or pour-over.[^s3]\n\nTo compare recipes objectively rather than by taste alone, enthusiasts measure a brew's strength as its total dissolved solids ([TDS](../abbreviations/tds-total-dissolved-solids.md)) and calculate the extraction yield ([EY](../abbreviations/ey-extraction-yield.md)) for a given grind and ratio.[^s1][^llm1]\n\n[Cold brew](cold-brew.md) inverts the usual ratio: rather than brewing close to serving strength, it steeps at a far more concentrated ratio of about 1:8 grounds to water and dilutes the result down to taste afterward, typically 1:1 up to 1:3 with water or milk.[^s2]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Roasting](roasting.md)\n- [Cold brew](cold-brew.md)\n- [Espresso](espresso.md)\n- [TDS — Total Dissolved Solids](../abbreviations/tds-total-dissolved-solids.md)\n- [EY — Extraction Yield](../abbreviations/ey-extraction-yield.md)\n- [Caffeine and health](caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^llm1]: LLM - model knowledge, not from a raw file (added 2026-07-01)\n[^s2]: [raw/cold-brew-notes.md](../../raw/cold-brew-notes.md) — R&D bench log for the house cold brew recipe (ingested 2026-07-01)\n[^s3]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n","outbound":["abbreviations/ey-extraction-yield.md","abbreviations/tds-total-dissolved-solids.md","concepts/caffeine-and-health.md","concepts/coffee.md","concepts/cold-brew.md","concepts/espresso.md","concepts/roasting.md"],"inbound":["abbreviations/ey-extraction-yield.md","abbreviations/tds-total-dissolved-solids.md","concepts/caffeine-and-health.md","concepts/coffee.md","concepts/cold-brew.md","concepts/espresso.md","concepts/tea-brewing-temperature-and-time.md"]},{"rel_path":"concepts/caffeine-and-health.md","type":"Concept","title":"Caffeine and Health","description":"How caffeine affects the body — the adenosine mechanism, half-life, safe limits, tolerance and withdrawal, and the evidence (and myths) around coffee and health.","tags":["coffee","caffeine","health"],"body":"\nCaffeine works by blocking adenosine receptors in the brain.[^s1] Adenosine is the molecule that builds up over the course of the day and produces \"sleep pressure,\" the drowsy feeling that grows the longer a person has been awake.[^s1] Caffeine's shape is similar enough to adenosine that it occupies the same receptors without activating them, which stops the brain's \"time to wind down\" signal and produces alertness — caffeine does not add energy, it masks tiredness.[^s1] Because caffeine only blocks the receptors and does not remove the adenosine molecule itself, the backed-up adenosine reaches the receptors all at once once the caffeine wears off, which is why some people feel a sudden slump later in the day.[^s1]\n\n## Half-life and timing\n\nCaffeine's half-life is about 5 hours: roughly five hours after a cup, half of the caffeine consumed is still in the bloodstream, and half of that remains five hours after that, and so on.[^s1] As a result, a strong afternoon coffee can still leave a noticeable amount of caffeine active in the body at bedtime, even if the drinker no longer feels wired.[^s1] A good rule of thumb is to have the last full-strength coffee at least six to eight hours before sleep, pushed earlier for slow metabolizers, or replaced with decaf in the evening.[^s1]\n\nThe half-life varies meaningfully between individuals: genetics, liver enzyme activity, smoking, certain medications, and pregnancy can all stretch or shorten it, so \"about 5 hours\" is a solid average for a healthy adult but not a fixed number — someone who finds that coffee keeps them up at night may simply be a slow metabolizer.[^s1]\n\n> [!CONTRADICTION]\n> This wiki's coffee-and-caffeine FAQ puts caffeine's half-life at about 5 hours[^s1], but a coffee shop's internal [cold brew](cold-brew.md) bench notes, used for staff menu-card timing guidance, put it at about 3 hours[^s2].\n>\n> Resolution: about 5 hours is the better-supported figure for a typical healthy adult; the 3-hour bench number looks like a simplified rule of thumb for quick service-timing decisions rather than a carefully sourced estimate.[^llm1]\n\n## Dose, hidden sources, and decaf\n\nA standard 8 oz cup of drip coffee contains about 95 mg of caffeine, the baseline figure used for comparison.[^s1] In practice a \"cup\" is often bigger than 8 oz, and a large café coffee can easily contain two or three times that amount.[^s1] Beyond [brewing method, grind size, dose, water temperature, and contact time](brewing-ratios.md), the bean species is one of the biggest factors driving caffeine content, since [Robusta carries roughly twice the caffeine of Arabica](arabica-and-robusta.md).[^s1]\n\nCaffeine also hides in foods and drinks beyond coffee: chocolate, [many teas](caffeine-in-tea.md), some sodas, energy drinks, and certain pain relievers and supplements all contain it, and count toward a daily limit just as coffee does.[^s1] Decaf coffee is not entirely caffeine-free — \"decaffeinated\" does not mean zero caffeine, and decaf retains a small trace of the regular amount, though it keeps most of the flavor while removing the large majority of the caffeine, making it a reasonable substitute later in the day or for anyone cutting back.[^s1]\n\n## Safe limits and pregnancy\n\nFor most healthy adults, a few cups of coffee spread across the day is generally considered fine; problems tend to start when caffeine piles up quickly, with jitteriness, a racing heart, anxiety, and trouble sleeping as the common warning signs, and the advice when those appear is to ease off and take a few caffeine-light days.[^s1] Tolerance differs from person to person and tends to drift higher the more regularly someone drinks coffee.[^s1] During pregnancy, common guidance is to keep caffeine intake under about 200 mg per day — roughly two standard 8 oz cups of drip coffee — counting caffeine from [tea](tea.md), chocolate, soft drinks, and energy drinks toward that same limit, with a doctor's individual advice taking priority.[^s1]\n\n## Coffee, disease risk, and the limits of association\n\nStudies that follow large groups of people over time have found that drinking 3-4 cups of coffee a day is associated with a lower risk of type 2 diabetes and Parkinson's disease.[^s1] These are population-level observations, not proof that coffee causes the lower risk: people who drink moderate coffee may differ from others in additional ways, association studies cannot fully separate coffee from the rest of a person's life, and showing a direct causal effect would require controlled trials that are difficult to run over the long term.[^s1] The honest summary is that moderate coffee drinking is linked to some good outcomes and the signal is consistent enough to be interesting, but \"linked to\" is as far as the current evidence goes, and it should not be read as license to drink coffee purely as medicine.[^s1]\n\n## Tolerance and withdrawal\n\nWith regular intake the body grows more adenosine receptors, so the same dose of caffeine has less effect over time and a regular drinker may need somewhat more for the same lift.[^s1] The flip side is dependence: skipping a usual coffee can bring on a withdrawal headache, fatigue, or irritability for a day or two, though it passes, and tapering down slowly is easier than quitting abruptly.[^s1]\n\n## Common myths\n\nCaffeine is a mild diuretic, but the water content of a cup of coffee more than offsets that effect, so a cup of coffee still counts toward fluid intake and normal coffee drinking does not cause dehydration for most people.[^s1] The idea that coffee stunts growth is a myth with no good evidence behind it — caffeine does not shrink anyone — though the kernel of truth is that caffeine late in the day can disrupt the sleep that growing kids and teens need, which is the real basis for caution around caffeine in young people, not height.[^s1] Coffee is naturally acidic and stimulates stomach activity, which can upset a sensitive stomach, especially on an empty one; eating alongside coffee, switching to a darker or cold-brewed coffee, or simply cutting back can help, since it is a matter of individual sensitivity rather than a flaw in the coffee.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Arabica and Robusta](arabica-and-robusta.md)\n- [Brewing ratios](brewing-ratios.md)\n- [Cold brew](cold-brew.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Tea Antioxidants and Tannins](tea-antioxidants-and-tannins.md)\n\n## Sources\n\n[^s1]: [raw/coffee-health-faq.md](../../raw/coffee-health-faq.md) — coffee and caffeine health FAQ (ingested 2026-07-01)\n[^s2]: [raw/cold-brew-notes.md](../../raw/cold-brew-notes.md) — R&D bench log for the house cold brew recipe (ingested 2026-07-01)\n[^llm1]: LLM - model knowledge, not from a raw file (added 2026-07-01)\n","outbound":["concepts/arabica-and-robusta.md","concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/cold-brew.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea.md"],"inbound":["concepts/arabica-and-robusta.md","concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/cold-brew.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","organizations/thornbury-and-lin.md"]},{"rel_path":"concepts/caffeine-in-coffee.md","type":"Concept","title":"Caffeine in Coffee","description":"How much caffeine coffee contains, what drives the differences between cups, and why roast level barely affects it.","tags":["coffee","caffeine"],"body":"\nCaffeine is the principal stimulant in [coffee](coffee.md) and a major reason for its popularity.[^s1] The amount in a serving depends on the species used, the dose of coffee, and the brewing method.[^s1] A standard 8-ounce cup of drip coffee contains about 95 mg of caffeine.[^s1][^s2] Espresso is far more concentrated per unit volume, but an individual shot is small, so the caffeine in a single espresso is often comparable to or less than that in a full cup of drip coffee.[^s1] A single [espresso](espresso.md) shot, about one ounce, carries roughly 63 mg of caffeine.[^s4]\n\n## Roast level and caffeine\n\nA persistent and widespread belief holds that dark roasts contain dramatically more or less caffeine than light roasts, but in fact roast level barely changes the caffeine content of coffee.[^s1] Caffeine is a remarkably stable molecule that does not break down meaningfully at the temperatures reached during [roasting](roasting.md), so a dark roast is not decaffeinated by the act of roasting, nor does it carry dramatically less caffeine than a light roast — measured by weight of coffee, light and dark roasts are nearly equal in caffeine.[^s1]\n\nThe minor differences that people do observe are largely a matter of measurement: because dark-roasted beans have lost more moisture and expanded more, they are slightly less dense than light-roasted beans, so a scoop measured by volume of dark roast contains marginally fewer beans, while a portion measured by weight contains marginally more, since each bean weighs less.[^s1] These are small effects of how the coffee is dosed, not of caffeine being destroyed in the roaster.[^s1] The species used — [Robusta carries roughly twice the caffeine of Arabica](arabica-and-robusta.md) — and the overall dose of coffee relative to water exert a far greater influence on the caffeine in the finished cup than the roast level ever does.[^s1]\n\n## Temperature and the cold-brew myth\n\nServing temperature is another factor people get wrong: [cold brew](cold-brew.md) is widely assumed to be lower in caffeine because it is served cold, but it often ends up with *higher* total caffeine than hot drip.[^s3] The driver is brewing ratio and contact time, not temperature — cold brew's concentrated grind-to-water ratio (around 1:8) and long 12-18 hour steep pull more caffeine, with a 1:8 concentrate running about 2.5x the caffeine of a standard hot drip mug before dilution.[^s3] A finished glass still varies with how much the concentrate is diluted, so the \"cold = less caffeine\" rule of thumb is really about strength, not temperature.[^s3]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Arabica and Robusta](arabica-and-robusta.md)\n- [Roasting](roasting.md)\n- [Cold brew](cold-brew.md)\n- [Caffeine and health](caffeine-and-health.md)\n- [Espresso](espresso.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Aurora Midnight](../objects/aurora-midnight.md) — a brand claim that conflicts with the roast/caffeine relationship described above\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^s2]: [raw/coffee-health-faq.md](../../raw/coffee-health-faq.md) — coffee and caffeine health FAQ (ingested 2026-07-01)\n[^s3]: [raw/cold-brew-notes.md](../../raw/cold-brew-notes.md) — R&D bench log for the house cold brew recipe (ingested 2026-07-01)\n[^s4]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n","outbound":["concepts/arabica-and-robusta.md","concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/cold-brew.md","concepts/espresso.md","concepts/roasting.md","objects/aurora-midnight.md"],"inbound":["concepts/arabica-and-robusta.md","concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/cold-brew.md","concepts/espresso.md","concepts/matcha.md","concepts/roasting.md","objects/aurora-midnight.md"]},{"rel_path":"concepts/caffeine-in-tea.md","type":"Concept","title":"Caffeine in Tea","description":"How much caffeine the different tea types contain, why white tea is not caffeine-free despite being the least processed, and how tea's caffeine compares to coffee's and affects sleep and hydration.","tags":["tea","caffeine"],"body":"\nLike [coffee](coffee.md) and cocoa, [tea](tea.md) naturally contains caffeine, the stimulant responsible for much of its reviving reputation — the tea plant produces it naturally, just like the coffee plant does, so tea earns its calmer reputation from how it pairs caffeine with other compounds, not from being caffeine-free.[^s1][^s2] The amount in a finished cup depends on the type of tea, the quantity of leaf used, the [water temperature, and the length of the steep](tea-brewing-temperature-and-time.md), but useful averages can be given.[^s1]\n\nA cup of black tea contains about 47 mg of caffeine[^s1][^s2], while a cup of green tea contains about 28 mg.[^s1] The lower figure for green tea reflects both its cooler brewing water and its shorter typical steep rather than any fundamental shortage of caffeine in the leaf itself.[^s1]\n\n> [!CONTRADICTION]\n> This wiki's tea guide and health FAQ put green tea at about 28 mg of caffeine per cup against about 47 mg for black tea[^s1][^s2], but a narrative history of the tea trade puts both at about 50 mg per cup, describing green and black tea as carrying \"very nearly the same\" caffeine.[^s3]\n>\n> Both accounts agree that green and black tea come from the same plant and differ only in processing; they disagree on how much that processing actually narrows the caffeine gap. Left unresolved here.\n\n| Type   | Caffeine (per cup) |\n| ------ | -------------------- |\n| White  | ~30–55 mg              |\n| Green  | ~28 mg                 |\n| Oolong | ~37 mg                 |\n| Black  | ~47 mg                 |\n| Pu-erh | ~40 mg                 |\n\nA common misconception deserves correction: white tea does contain caffeine, roughly 30 to 55 mg per cup.[^s1] Being the least processed of the teas (see [Tea Types and Oxidation](tea-types-and-oxidation.md)) does not render it caffeine-free.[^s1] In fact, because white tea is made from very young buds, which are rich in the compound, its caffeine content can rival or exceed that of some green and even black teas.[^s1] Anyone seeking to avoid caffeine entirely should choose a genuine herbal infusion rather than any product of the tea plant.[^s1]\n\n## Tea versus coffee\n\nCup for cup, tea generally has noticeably less caffeine than coffee: a cup of black tea carries about 47 mg against the roughly 95 mg in a standard cup of [drip coffee](caffeine-in-coffee.md), so tea is delivering roughly half the caffeine of the coffee sitting next to it.[^s2] That gap matters because it gives a drinker more room to enjoy multiple cups across the day without their total caffeine intake climbing as fast as a coffee drinker's would, though total caffeine across cups — not any single cup — is still the thing to watch.[^s2]\n\n## L-theanine and a calmer kind of alert\n\nTea's caffeine does not act alone: the leaf also carries L-theanine, a calming amino acid that smooths out caffeine's sharper edge, so the two together produce a calm, focused alertness — a steadier, gentler lift than coffee's jolt — rather than caffeine acting on its own.[^s2] See [Tea Antioxidants and Tannins](tea-antioxidants-and-tannins.md#l-theanine) for what L-theanine is and how this pairing works.\n\n## Caffeine, sleep, and the evening switch\n\nBecause tea contains caffeine, drinking it too close to bedtime can disrupt sleep just as coffee can, even though the dose is gentler — anyone sensitive to caffeine should treat an evening cup of tea with the same caution as an evening coffee.[^s2] Caffeine can linger in the body for hours, so a good habit is to switch to caffeine-free options in the late afternoon or early evening, with an even larger buffer for anyone who metabolizes caffeine slowly; see [Caffeine and Health](caffeine-and-health.md#half-life-and-timing) for how long caffeine actually stays active in the body.[^s2] For an evening cup, reach for a genuine herbal infusion, sometimes called a [tisane](tea.md) — chamomile, peppermint, rooibos, and lemon balm are not made from the tea plant, so they carry no caffeine and won't interfere with winding down.[^s2]\n\n## Hydration\n\nDespite an old myth that tea dehydrates the drinker, a normal cup of tea is mostly water and contributes to daily hydration; the caffeine levels in everyday tea are far too low to have any meaningful dehydrating effect.[^s2]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Tea Brewing Temperature and Time](tea-brewing-temperature-and-time.md)\n- [Tea Antioxidants and Tannins](tea-antioxidants-and-tannins.md)\n- [Matcha](matcha.md)\n- [Caffeine in Coffee](caffeine-in-coffee.md)\n- [Caffeine and Health](caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n[^s2]: [raw/tea-health-faq.md](../../raw/tea-health-faq.md) — tea and health FAQ (ingested 2026-07-01)\n[^s3]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n","outbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"inbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md","organizations/thornbury-and-lin.md"]},{"rel_path":"concepts/coffee-history-and-trade.md","type":"Concept","title":"Coffee History and Trade","description":"Coffee's spread from Ethiopia through Yemen and Europe to global cultivation, and today's leading producing countries.","tags":["coffee","history","trade"],"body":"\n[Coffee](coffee.md) was first cultivated in the highlands of Ethiopia, where *Coffea arabica* grows wild and where the practice of preparing the seeds as a drink is believed to have originated.[^s1] From this East African cradle, coffee crossed the Red Sea and took root in Yemen, where it was systematically cultivated and traded; the Yemeni port of Mocha became so closely associated with the commodity that its name endures as a coffee term to this day.[^s1]\n\nThrough Yemen and the wider Arab world, coffee spread as both a commercial good and a social institution, and coffeehouses became centers of conversation, commerce, and learning across the region long before the drink was known in Europe.[^s1] By the 17th century coffee had reached Europe, where it was initially regarded as an exotic novelty before rapidly becoming a fixture of urban life; European coffeehouses, like their predecessors in the Arab world, grew into gathering places for merchants, writers, and political thinkers.[^s1]\n\nAs demand grew, colonial powers carried coffee cultivation to tropical regions across the globe, establishing plantations throughout Asia, Africa, and the Americas, which reshaped the geography of production.[^s1] Today the largest producer of coffee in the world is Brazil, whose vast plantations supply an enormous share of the global market; Vietnam ranks second, having risen to prominence largely on the strength of [Robusta](arabica-and-robusta.md) cultivation.[^s1] Other significant producers include Colombia, Indonesia, Ethiopia, and several nations of Central America.[^s1]\n\n## A trade shared with tea\n\nCoffee's arrival in Europe ran on rails shared with [tea](tea.md): the same shipping routes that carried tea from the China coast often called at the ports where coffee was gathered, the same trading houses financed both commodities, and the two drinks arrived in Europe almost as twins.[^s2] The merchant house [Thornbury & Lin](../organizations/thornbury-and-lin.md), for instance, is said to have traded coffee and tea together in the same holds from the start, a poor season in one steadied by a good one in the other.[^s2] See [Tea History](tea-history.md) for tea's own path from China to England.[^s2]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Arabica and Robusta](arabica-and-robusta.md)\n- [Tea History](tea-history.md)\n- [Thornbury & Lin](../organizations/thornbury-and-lin.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n[^s2]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n","outbound":["concepts/arabica-and-robusta.md","concepts/coffee.md","concepts/tea-history.md","concepts/tea.md","organizations/thornbury-and-lin.md"],"inbound":["concepts/coffee.md","concepts/tea-history.md","organizations/thornbury-and-lin.md"]},{"rel_path":"concepts/coffee-processing.md","type":"Concept","title":"Coffee Processing","description":"The washed, natural, and honey methods of extracting and drying coffee seeds after harvest, and how each shapes flavor.","tags":["coffee","processing"],"body":"\nAfter harvesting, the [coffee](coffee.md) cherry must be processed to extract and dry the seed, and the processing method has a pronounced effect on the final flavor of the coffee; three principal approaches are used.[^s1]\n\n## Washed (wet) process\n\nIn the washed process the outer skin and most of the fruit pulp are removed before the seeds are fermented in water to break down the remaining mucilage, then washed clean and dried.[^s1] Washed coffees tend to present a cleaner, brighter, and more acidic profile in which the intrinsic character of the bean is clearly expressed.[^s1]\n\n## Natural (dry) process\n\nIn the natural process the whole cherry is dried intact in the sun before the seed is extracted.[^s1] Because the seed remains in contact with the fruit throughout drying, natural coffees often take on heavier body and pronounced fruity, sometimes fermented, sweetness.[^s1]\n\n## Honey process\n\nThe honey process, sometimes described as pulped natural, is an intermediate method in which the skin is removed but some of the sticky mucilage is deliberately left on the seed during drying.[^s1] The result generally falls between the washed and natural styles, combining a degree of clarity with added sweetness and body.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Roasting](roasting.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n","outbound":["concepts/coffee.md","concepts/roasting.md"],"inbound":["concepts/coffee.md","concepts/roasting.md"]},{"rel_path":"concepts/coffee.md","type":"Concept","title":"Coffee","description":"A brewed beverage made from the roasted, ground seeds of the Coffea plant, valued as a stimulant and for its varied sensory flavor.","tags":["coffee","beverage","botany"],"body":"\nCoffee is a brewed beverage prepared from the roasted and ground seeds of the *Coffea* plant.[^s1] Although these seeds are universally called \"beans,\" they are in fact the pits of a small fruit known as the coffee cherry.[^s1] After harvest the seeds are separated from the surrounding pulp, dried, roasted, ground, and finally infused in hot water to produce the dark, aromatic drink consumed across the world.[^s1]\n\nCoffee is valued both as a daily stimulant, owing to its naturally occurring [caffeine](caffeine-in-coffee.md), and as a sensory product whose flavor reflects its botanical variety, growing region, [processing](coffee-processing.md), and [roast](roasting.md).[^s1]\n\n## Species\n\nThe genus *Coffea* contains many species, but two — [Arabica and Robusta](arabica-and-robusta.md) — account for essentially all commercial production.[^s1]\n\n## See also\n\n- [Arabica and Robusta](arabica-and-robusta.md)\n- [Coffee history and trade](coffee-history-and-trade.md)\n- [Coffee processing](coffee-processing.md)\n- [Roasting](roasting.md)\n- [Brewing ratios](brewing-ratios.md)\n- [Cold brew](cold-brew.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Caffeine and health](caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n","outbound":["concepts/arabica-and-robusta.md","concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee-history-and-trade.md","concepts/coffee-processing.md","concepts/cold-brew.md","concepts/roasting.md"],"inbound":["abbreviations/tds-total-dissolved-solids.md","concepts/arabica-and-robusta.md","concepts/aurora-ritual.md","concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/coffee-processing.md","concepts/cold-brew.md","concepts/espresso.md","concepts/matcha.md","concepts/roasting.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea.md","objects/aurora-midnight.md","organizations/caffe-aurora.md","organizations/thornbury-and-lin.md","persons/lina-marchetti.md"]},{"rel_path":"concepts/cold-brew.md","type":"Concept","title":"Cold Brew","description":"An immersion method that steeps coarse coffee grounds in room-temp or cold water for 12-18 hours to make a concentrate, diluted to taste before serving.","tags":["coffee","brewing","caffeine","measurement"],"body":"\nCold brew is an immersion method that steeps [coffee](coffee.md) grounds in room-temperature or cold water for a long period, rather than passing hot water through them quickly, and is brewed as a strong concentrate that is diluted to taste before serving.[^s1]\n\n## Grind and ratio\n\nA coarse grind, roughly 1100-1200 micron, is essential: finer grinds (\"fines\") produce a silty cup and over-extraction over the course of the long steep.[^s1] A regrind test at medium-coarse confirmed this — the resulting concentrate turned silty and slightly astringent at 16 hours, and the recipe reverted to coarse, which is treated as non-negotiable for a long steep.[^s1]\n\nThe anchor [brewing ratio](brewing-ratios.md) is 1:8 grounds to water for the concentrate; everything else dilutes down from that number.[^s1] The concentrate is then diluted to taste, typically 1:1 up to 1:3 (concentrate:liquid) with water, milk, or ice for serving.[^s1]\n\n## Steep time and temperature\n\nThe working steep window is 12-18 hours: under 12 hours the cup tastes thin and sour, and past 18 hours it turns woody.[^s1] A room-temperature (22 C) versus fridge (4 C) comparison at 14 hours found the fridge run reads a lower concentrate total dissolved solids ([TDS](../abbreviations/tds-total-dissolved-solids.md)) than the room-temperature run (3.6% vs 4.0%), because cold water extracts more slowly; to reach an equivalent strength the fridge steep needs about 18 hours, while a room-temperature steep can stop around 14.[^s1] The two also taste different: the fridge steep is cleaner and brighter, while the room-temperature steep is rounder and heavier-bodied.[^s1]\n\nA logged steep curve at room temperature (22 C, 1:8) tracked concentrate TDS against steep time: 10 h - 3.1%, 12 h - 3.5%, 14 h - 4.0%, 16 h - 4.1%, 18 h - 4.2%.[^s1] Extraction plateaus after about 16 hours, so steeping longer brings diminishing returns along with a rising risk of woody flavor past 18 hours.[^s1] A single gentle stir at the 8-hour mark raised concentrate TDS from a 4.0% unstirred control to 4.3% with no added astringency; this was adopted for batch-sized production only, since the extra labor isn't worth it for small batches.[^s1]\n\n## Strength: TDS and extraction yield\n\nThe house concentrate TDS target is locked at 4.0-4.2%.[^s1] Extraction yield ([EY](../abbreviations/ey-extraction-yield.md)) — the percentage of the dry grounds' mass that ends up dissolved in the beverage — is calculated as `(TDS% x beverage mass) / dry grounds mass`.[^s1] For a room-temperature 14-hour run (TDS 4.0%, 1820 g draw-off, 250 g grounds), this works out to about 29.1% EY, notably higher than the roughly 20% EY of the same bean brewed hot drip.[^s1] Despite its lower temperature, cold brew's long steep extracts more of the bean's total soluble material than a quick hot brew does, and does so gently enough to avoid bitterness.[^s1]\n\n## Water and filtering\n\nThe recipe started with filtered water at about 38 ppm TDS, then was changed to mineral-added water at about 60 ppm (via a mineral sachet), which produced a sweeter, more defined concentrate at 4.2% TDS while keeping acidity low; water softer than about 30 ppm produces a flat, hollow cup.[^s1]\n\nFiltering matters too: the house spec draws the concentrate off through a stainless-steel screen followed by a single paper filter polish, which removes silt and leaves a glassy-clear cup, whereas filtering through nylon alone leaves more body but a cloudy result with sediment at the bottom of the keg.[^s1]\n\n## Caffeine\n\nCold brew is widely assumed to be lower in caffeine because it is served cold, but that is a myth — it often ends up with a *higher* total caffeine content than hot drip coffee.[^s1] The reason is the brewing ratio and time, not the temperature: a large grounds-to-water ratio (about 1:8) combined with a 12-18 hour steep pulls a lot of caffeine into the concentrate, to the point that a 1:8 cold brew concentrate runs about 2.5x the caffeine of a standard hot drip mug before dilution.[^s1] What ends up in a finished glass still varies with how much a drinker dilutes the concentrate, but per gram of grounds used, cold brew is the more caffeinated method.[^s1] See [Caffeine in coffee](caffeine-in-coffee.md) for how this compares with other factors that drive caffeine content.\n\nBecause cold brew's caffeine lingers, staff guidance is not to sell a full-strength cold brew too late in the day — flagged on the menu cards as a caution for after-2pm orders.[^s1] See [Caffeine and health](caffeine-and-health.md) for how this bench figure for caffeine's half-life compares with the estimate used elsewhere in this wiki.[^s1]\n\n## Serving, milk, and nitro\n\nConcentrate is diluted to taste, typically 1:1 up to 1:3 with water or milk plus ice; the house default serving dilution is 1:2.[^s1] For milk service, 1:1 concentrate to whole milk over ice is the best seller, since the milk carries the body; oat milk works well as the default dairy alternative, while almond milk goes thin.[^s1]\n\nCharging the same concentrate with nitrogen (N2) for a nitro tap gives a creamier mouthfeel and a perceived sweetness increase, even though TDS and caffeine content are unchanged (about 4.0% TDS either way) — the nitro effect is about texture and perception, not extraction chemistry.[^s1]\n\n## Shelf life\n\nSealed concentrate keeps in the fridge for about 10-14 days before its acidity starts creeping up; once diluted into a ready-to-drink glass it lasts only 2-3 days before flavor drops off.[^s1]\n\n## Batch scale-up\n\nA scaled batch of 5 kg grounds to 40 kg water (still 1:8), steeped 18 hours at room temperature in a 19 C kitchen, produced a concentrate TDS of 4.0%, consistent with small-batch results, and yielded about 36 L of concentrate off the press.[^s1]\n\n## House spec\n\nThe locked house cold brew spec: coarse grind (burr setting 9.5), 1:8 ratio, steeped 14-16 hours at room temperature or 18 hours in the fridge; a stainless-steel screen draw-off followed by a single paper filter polish; mineral water around 60 ppm; concentrate TDS target 4.0-4.2%; served diluted 1:2 by default.[^s1] The two talking points used at the bar are that cold brew is smoother and less acidic than hot coffee, and that — counterintuitively — it has more total caffeine than hot drip; both claims are true and both are used to sell it.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Brewing ratios](brewing-ratios.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Caffeine and health](caffeine-and-health.md)\n- [TDS — Total Dissolved Solids](../abbreviations/tds-total-dissolved-solids.md)\n- [EY — Extraction Yield](../abbreviations/ey-extraction-yield.md)\n\n## Sources\n\n[^s1]: [raw/cold-brew-notes.md](../../raw/cold-brew-notes.md) — R&D bench log for the house cold brew recipe (ingested 2026-07-01)\n","outbound":["abbreviations/ey-extraction-yield.md","abbreviations/tds-total-dissolved-solids.md","concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee.md"],"inbound":["concepts/brewing-ratios.md","concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/coffee.md"]},{"rel_path":"concepts/espresso.md","type":"Concept","title":"Espresso","description":"A concentrated coffee brewing method made by forcing hot water through finely ground coffee under pressure, and the bar ritual built around it.","tags":["coffee","espresso","brewing","ritual"],"body":"\nEspresso is a [brewing](brewing-ratios.md) method made by forcing hot water through a compact bed of very finely ground [coffee](coffee.md) at roughly nine bars of pressure.[^s1] The barista tamps the grounds flat and level, locks the portafilter into the machine's group head with a quarter turn, and starts the pump; the shot pulls for roughly twenty-five to thirty seconds.[^s1] The window is narrow: a shot pulled too fast comes out thin and sour, while one pulled too slow turns bitter and scorched.[^s1]\n\nA typical double shot starts with about eighteen grams of ground coffee and yields about thirty-six grams of liquid in the cup — roughly a 1:2 ratio by weight, far more concentrated than most [drip brewing ratios](brewing-ratios.md).[^s1]\n\n## Crema\n\nAs a shot pulls, a fragile reddish-brown foam of emulsified oils and dissolved gas called crema settles across the top of the liquid; it is the visible signature of the extraction pressure, and an experienced barista can read it to judge whether the grind and tamp were correct.[^s1]\n\n## Caffeine\n\nA single shot of espresso, about one ounce, carries roughly 63 mg of [caffeine](caffeine-in-coffee.md) — less than a standard cup of drip coffee, even though espresso is far more concentrated per unit of volume.[^s1]\n\n## Bar culture\n\nDrinking espresso is traditionally a quick transaction at a standing bar: order, drink it in a few swallows, set the cup down, pay, and leave, all of which can be over in about ninety seconds.[^s1] An espresso bar at its best works as a social leveling place — people of different professions and status stand at the same counter, drink the same drink at the same price, with no table service separating them into different classes.[^s1] [Caffe Aurora](../organizations/caffe-aurora.md) was built around this idea that the bar itself, not any single roast, is the real product.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Brewing ratios](brewing-ratios.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Caffe Aurora](../organizations/caffe-aurora.md)\n- [Aurora Ritual](aurora-ritual.md)\n\n## Sources\n\n[^s1]: [raw/espresso-and-cafe-culture.md](../../raw/espresso-and-cafe-culture.md) — essay on espresso extraction and café culture (ingested 2026-07-01)\n","outbound":["concepts/aurora-ritual.md","concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/coffee.md","organizations/caffe-aurora.md"],"inbound":["concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","organizations/caffe-aurora.md","persons/lina-marchetti.md"]},{"rel_path":"concepts/matcha.md","type":"Concept","title":"Matcha","description":"Shade-grown green tea, dried and stone-ground into a fine powder that is whisked whole into hot water rather than steeped and discarded.","tags":["tea","matcha","beverage","brewing","caffeine"],"body":"\nMatcha is green tea that has been dried and milled into a fine powder.[^s1] Unlike a cup of loose-leaf green tea such as sencha, which is steeped and the leaf discarded, matcha powder is whisked directly into hot water and the whole ground leaf is drunk, suspended in the cup, rather than just an infusion of it.[^s1] Because the entire leaf is swallowed rather than only an infusion of it, a single serving of matcha carries more caffeine than the same weight of steeped green tea — about 60-70 mg per bowl, roughly what a modest cup of [brewed coffee](coffee.md) delivers, but with a slower, steadier lift.[^s1] See [Caffeine in coffee](caffeine-in-coffee.md) for how that figure compares to other caffeinated drinks.\n\nMatcha comes from the same plant as every other [green or black tea](tea-types-and-oxidation.md), *[Camellia sinensis](tea.md)*; what sets it apart is how it is grown and finished, not the plant itself.[^s1] The leaf is shade-grown for a few weeks before harvest and then stone-ground after drying, rather than processed like ordinary loose-leaf tea.[^s1] Shading pushes the leaf to produce more chlorophyll and more of the amino acids responsible for matcha's sweet, savory edge, and the stone mill turns the dried leaf into the talc-fine powder that is whisked rather than steeped.[^s1]\n\n## Grades\n\nMatcha is sold in grades, and the grade dictates how it should be used.[^s1]\n\n**Ceremonial grade** is made from the youngest, tenderest spring leaves, stone-ground slowly so the powder stays cool and fine, giving it a bright, almost electric jade-green color.[^s1] It is smooth and sweet with very little of the harsh bitterness that puts newcomers off, and is the grade meant to be whisked plain with nothing but water.[^s1]\n\n**Culinary grade** is made from later harvests of slightly coarser leaf, giving it a duller, more olive-toned green and a stronger, more astringent taste.[^s1] That stronger profile is an advantage rather than a flaw once the matcha has to fight through milk, sugar, ice, or batter, so culinary grade is the right choice for lattes, smoothies, ice cream, and baking.[^s1] Buying ceremonial grade for a sweetened iced latte wastes money, while whisking culinary grade plain leaves a drinker wondering why anyone likes matcha at all.[^s1]\n\nColor is a quick quality check at the point of purchase: a vivid, saturated green signals a higher grade and a fresher milling, while yellowish, brownish, or grey-green powder indicates an old, oxidized, or low-quality product that should be skipped.[^s1]\n\n## Equipment and dose\n\nA bowl of matcha calls for 1 to 2 grams of matcha (about half a teaspoon to a slightly heaped teaspoon), hot water that is not boiling, a bamboo whisk (a *chasen*) — or a small metal milk frother or a fork in a pinch — a wide bowl or flat-bottomed mug, and a small fine-mesh sieve.[^s1]\n\n## Water temperature\n\nBoiling water must never be poured directly on matcha: green tea in general, and matcha especially, turns bitter and flat if the water is too hot, so the water should be brought to about 70-80 C.[^s1] Without a thermometer, two tricks land in the right window: boil the kettle and let it sit and cool for two to three minutes, or pour the hot water into the serving bowl first to take the edge off before tipping it into a second vessel.[^s1] Erring cooler is safer than erring hotter — a slightly under-temperature bowl is still pleasant, while an over-temperature one is ruined.[^s1]\n\n## Preparing usucha (thin matcha)\n\nUsucha is the everyday, drink-it-plain method, made with ceremonial grade matcha.[^s1] It follows a fixed sequence:\n\n1. Warm and dry the bowl: rinsing it with hot water and pouring it out keeps the matcha from cooling too fast, and drying the inside stops the powder from clumping on contact.[^s1]\n2. Sift the matcha: 1 to 2 grams measured into the sieve and tapped through into the bowl removes the clumps that would otherwise turn into chalky, unwhiskable beads, making sifting the single biggest difference between a smooth bowl and a gritty one.[^s1]\n3. Add a splash of the 70-80 C water — about 15 to 20 ml — to wet the powder into a paste, since working a paste first crushes out the last clumps before the full volume of water is added.[^s1]\n4. Press the powder and water against the bottom of the bowl with the back of the whisk or a spoon until it forms a glossy, lump-free paste.[^s1]\n5. Top up with the rest of the water, about 60 to 70 ml total for a single bowl — enough to whisk freely without filling the bowl to the brim.[^s1]\n6. Whisk in a zig-zag: moving the whisk briskly back and forth in a straight \"W\"/\"M\" pattern, rather than stirring in a circle, is what whips air into the matcha, since circular stirring just pushes the powder around.[^s1]\n7. Whisk for 15 to 20 seconds until a fine, pale foam with small even bubbles covers the whole surface, then lift the whisk straight up through the center to settle the surface once a soft, milky froth has formed.[^s1]\n8. Drink it fresh: matcha does not hold, and the powder settles within a minute or two, so it should be drunk while the foam is up and the bowl is warm, with a quick swirl near the end to finish the leaf settled at the bottom.[^s1]\n\n## Matcha latte\n\nA matcha latte uses culinary grade matcha, since the milk needs the stronger flavor to come through.[^s1] The method is to sift 2 grams of culinary matcha into a mug, add a splash of 70-80 C water and whisk it to a smooth, frothy concentrate using the same zig-zag motion, then heat and froth milk separately — dairy or oat both work well — and pour it over the concentrate; for an iced version, the concentrate is poured over ice and cold milk instead.[^s1] A little honey or simple syrup, added to taste, balances the astringency of culinary grade.[^s1]\n\n## Troubleshooting\n\nA gritty or lumpy bowl means the sieve was skipped or the water was added all at once — sifting and making the paste first fixes it.[^s1] A bitter, harsh flavor means the water was too hot, so it should be pulled back toward the cooler end of 70-80 C, with a check that the powder itself isn't tired and yellowed.[^s1] No froth forming usually means stirring in circles instead of a fast straight zig-zag, or too much water for the amount of powder, so loosening the wrist and speeding up the motion helps.[^s1] A weak, watery latte usually means ceremonial grade was used where culinary would have carried better, or the powder was under-dosed, so going up to a full 2 grams fixes it.[^s1]\n\n## Storage\n\nMatcha is fragile: light, heat, air, and moisture all dull its bright green color and flatten its flavor within weeks, so it should be kept in a sealed tin, in the dark, somewhere cool, and used up within a month or two of opening.[^s1] Powder that has gone dull and hay-colored has oxidized; it is still safe to drink but will taste flat, and no amount of careful whisking restores it.[^s1]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Coffee](coffee.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n- [Caffeine and health](caffeine-and-health.md)\n\n## Sources\n\n[^s1]: [raw/matcha-and-preparation.md](../../raw/matcha-and-preparation.md) — home guide to matcha grades and whisking technique (ingested 2026-07-01)\n","outbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-coffee.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"inbound":["concepts/caffeine-in-tea.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"]},{"rel_path":"concepts/roasting.md","type":"Concept","title":"Roasting","description":"The application of heat that transforms green coffee seeds into brown, aromatic beans, and how roast level from light to dark shapes flavor.","tags":["coffee","roasting"],"body":"\nRoasting is the application of heat that transforms green [coffee](coffee.md) seeds into the brown, aromatic beans recognized by consumers.[^s1] During roasting the beans undergo extensive chemical changes that develop hundreds of flavor and aroma compounds, drive off moisture, and cause the bean to expand and darken.[^s1]\n\nRoast levels run along a continuous spectrum from light to dark.[^s1] Light roasts preserve more of the bean's origin character, often with higher perceived acidity and brighter, more delicate flavors.[^s1] Medium roasts balance origin character with the sweetness and body developed during roasting.[^s1] Dark roasts push the process further, producing bolder, more bitter, and sometimes smoky flavors as the original character of the bean gives way to flavors generated by the roast itself.[^s1] The choice of roast is largely a matter of style and preference, and a single coffee can be roasted to very different effect.[^s1]\n\nRoast level has only a marginal effect on a coffee's [caffeine content](caffeine-in-coffee.md), contrary to a common assumption.[^s1]\n\n## See also\n\n- [Coffee](coffee.md)\n- [Coffee processing](coffee-processing.md)\n- [Caffeine in coffee](caffeine-in-coffee.md)\n\n## Sources\n\n[^s1]: [raw/coffee-guide.md](../../raw/coffee-guide.md) — general coffee survey article (ingested 2026-07-01)\n","outbound":["concepts/caffeine-in-coffee.md","concepts/coffee-processing.md","concepts/coffee.md"],"inbound":["concepts/brewing-ratios.md","concepts/caffeine-in-coffee.md","concepts/coffee-processing.md","concepts/coffee.md","objects/aurora-midnight.md","organizations/caffe-aurora.md"]},{"rel_path":"concepts/tea-antioxidants-and-tannins.md","type":"Concept","title":"Tea Antioxidants and Tannins","description":"The catechins, tannins, and other compounds beyond caffeine that shape tea's taste and its reputation as a healthful drink.","tags":["tea","health"],"body":"\nBeyond [caffeine](caffeine-in-tea.md), the [tea](tea.md) leaf is chemically rich, and much of its reputation as a healthful drink rests on its content of antioxidants.[^s1] Tea is a notable source of catechins, a family of plant antioxidants of which the most studied is epigallocatechin gallate (EGCG).[^s1][^s2] Catechins are most abundant in the less oxidised teas (see [Tea Types and Oxidation](tea-types-and-oxidation.md)), since oxidation converts many of them into other compounds; this is one reason green tea is so often singled out for its supposed benefits, while the more oxidised black tea develops different compounds and a bolder flavour instead.[^s1][^s2]\n\nTea also contains tannins, the astringent compounds that lend the brew its characteristic dryness and grip on the palate and that contribute to the colour of darker infusions.[^s1][^s2] Tannins bind readily with proteins and with iron, which is why tea can taste smoother when softened with milk and why very strong tea is sometimes discouraged alongside iron-rich meals.[^s1][^s2]\n\nThe leaf further supplies small amounts of vitamins, minerals, and aromatic oils.[^s1] The interplay of caffeine, catechins, and tannins gives each style of tea its particular balance of stimulation, sweetness, and astringency.[^s1]\n\n## L-theanine\n\nBeyond the catechins, tea also carries L-theanine, an amino acid that is nearly unique to the tea plant and is not found in most everyday foods.[^s2] It dissolves into the cup as the leaf steeps and is responsible for much of the calm, \"settled\" feeling that follows a good brew.[^s2] On its own, L-theanine nudges the drinker toward a calm, relaxed state, but its more notable effect shows up alongside [caffeine](caffeine-in-tea.md): caffeine supplies alertness that can feel sharp by itself, while L-theanine smooths out that edge, and together they produce a calm, focused alertness — \"awake without the jitters\" — that is steadier and gentler than the jolt of a cup of [coffee](coffee.md).[^s2] This pairing is a large part of why tea has a reputation for leaving people feeling composed rather than wired.[^s2]\n\n## Tannins, teeth staining, and iron absorption\n\nThe same tannins that give tea its body and brisk, slightly drying mouthfeel can, over time and with strong or frequent brewing, leave staining on tooth enamel.[^s2] Rinsing with water after a cup, not letting strong tea linger on the teeth in slow sips throughout the day, keeping up a normal brushing routine, and adding a splash of milk all help limit the effect.[^s2]\n\nTannins also bind iron in the digestive tract, reducing how much of it the body absorbs — particularly the plant-based (non-heme) iron from foods like beans, lentils, and leafy greens.[^s2] This is not a concern for most people eating a varied diet, but anyone who is low in iron or prone to deficiency is better off drinking tea between meals rather than alongside iron-rich ones, which sidesteps most of the binding effect.[^s2]\n\n## Moderation and everyday habits\n\nTea is genuinely good for most people in moderation: it is mostly water, naturally low in calories when unsweetened, and the main thing to watch is total caffeine intake, since it adds up across cups, together with the tannin effects above in very heavy drinking.[^s2] Milk changes the mouthfeel and softens tannins, but for everyday drinkers it does not meaningfully erase the benefits of a cup.[^s2] The tea itself stays healthful even sweetened — it is the added sugar, not the tea, that changes the math, so a heavily sweetened or sugary bottled tea can carry a lot of calories, while an unsweetened or lightly sweetened cup keeps tea firmly in the \"good for you\" column.[^s2]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Caffeine and Health](caffeine-and-health.md)\n- [Coffee](coffee.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n[^s2]: [raw/tea-health-faq.md](../../raw/tea-health-faq.md) — tea and health FAQ (ingested 2026-07-01)\n","outbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"inbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/tea.md"]},{"rel_path":"concepts/tea-brewing-temperature-and-time.md","type":"Concept","title":"Tea Brewing Temperature and Time","description":"Why different tea types need different water temperatures, and how steeping time shapes strength, sweetness, and astringency.","tags":["tea","brewing"],"body":"\nFew factors affect the quality of a finished cup of [tea](tea.md) more than water temperature.[^s1] Because the delicate compounds in lightly processed leaves scorch easily, green tea should be brewed with water well below boiling, at about 70 to 80 degrees Celsius — the same range used for [matcha](matcha.md).[^s1] Water that is too hot strips green tea of its sweetness and draws out a harsh bitterness instead.[^s1]\n\nBlack tea, by contrast, demands much hotter water, about 95 to 100 degrees Celsius, very near a full boil; only at this temperature do the fully oxidised leaves release their full colour, body, and flavour.[^s1] Oolong and white teas sit between these extremes, and pu-erh is generally brewed hot, often after a brief rinse of the leaves.[^s1] See [Tea Types and Oxidation](tea-types-and-oxidation.md#comparison-of-the-major-types) for the brewing temperature of each type.\n\nSteeping time matters as well: shorter steeps preserve subtlety, while longer steeps extract more strength and, eventually, more astringency.[^s1] As a rule, the leaf may be judged by both its colour in the cup and the balance of sweetness against bitterness on the palate.[^s1] Water temperature and steeping time also drive how much [caffeine](caffeine-in-tea.md) ends up in the cup.[^s1]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Matcha](matcha.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Brewing Ratios](brewing-ratios.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n","outbound":["concepts/brewing-ratios.md","concepts/caffeine-in-tea.md","concepts/matcha.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"inbound":["concepts/caffeine-in-tea.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"]},{"rel_path":"concepts/tea-growing-and-harvesting.md","type":"Concept","title":"Tea Growing and Harvesting","description":"How Camellia sinensis is cultivated, the prized young \"flush,\" and the two principal varieties, China and Assam.","tags":["tea","botany"],"body":"\n*Camellia sinensis*, the plant behind every [tea](tea.md), thrives in warm, humid climates with ample rainfall and good drainage, and many of the finest teas are grown at altitude, where cool nights slow the leaf's growth and concentrate flavour.[^s1] The plant is kept pruned to a low bush for ease of plucking.[^s1] The most prized harvest is the \"flush\" of young shoots — typically the bud and the two leaves immediately below it — which contain the highest proportion of the compounds responsible for aroma and briskness.[^s1]\n\n## Two principal varieties\n\nTwo principal varieties dominate cultivation.[^s1] The China variety is a smaller, hardier plant suited to cooler highland conditions, while the Assam variety, native to South Asia, is larger-leaved and favours hot, lowland tropics.[^s1] Most commercial teas derive from one of these two or from hybrids between them.[^s1]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Tea History](tea-history.md)\n- [Arabica and Robusta](arabica-and-robusta.md) — [coffee](coffee.md)'s analogous two-variety split\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n","outbound":["concepts/arabica-and-robusta.md","concepts/coffee.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"],"inbound":["concepts/tea-history.md","concepts/tea-types-and-oxidation.md","concepts/tea.md"]},{"rel_path":"concepts/tea-history.md","type":"Concept","title":"Tea History","description":"Tea's legendary discovery in China and its spread to Japan and Europe along trade and religious routes.","tags":["tea","history"],"body":"\n[Tea](tea.md) originated in China, where its cultivation and consumption can be traced across several thousand years of recorded and semi-legendary history.[^s1] According to legend, the beverage was discovered by the Emperor Shennong in 2737 BCE, when leaves from a wild tea shrub are said to have drifted into a pot of water he was boiling.[^s1] Charmed by the aroma and the reviving effect of the resulting infusion, the emperor is reputed to have championed the drink.[^s1] The story is traditional rather than documented, but it captures the antiquity that the Chinese themselves have long ascribed to tea, which had already lived a thousand years of legend in the hills of southwest China before reaching Europe at all.[^s1][^s2]\n\n## Three centuries, three methods\n\nIn China the leaf was first a medicine, then a discipline, and only much later a pleasure.[^s2] Early drinkers boiled it into a thick, bitter decoction, sometimes with salt or ginger, treating it as a tonic rather than a refreshment.[^s2] Centuries later the powder method arrived, in which dried leaf was ground fine and whisked with hot water into a jade-coloured froth — the method that would travel to Japan and survive there as [matcha](matcha.md).[^s2] Only centuries after that did the loose-leaf infusion familiar today become the common habit of scholars and farmers alike.[^s2] Each method left its mark and travelled at its own pace, carrying its own philosophy of how a person ought to slow down and pay attention.[^s2]\n\n## Spread to Japan\n\nTea travelled to Japan with Buddhist monks, who carried both the leaves and the disciplined ritual of preparing them, eventually giving rise to the celebrated Japanese tea ceremony.[^s1] Buddhist pilgrims who had travelled to China to study the sutras found that the brew, owing to its [caffeine](caffeine-in-tea.md), kept them awake through long nights of meditation, and when they returned home they brought back both the seeds and the customs, planting tea in temple gardens and tending it as a sacred crop.[^s2] What had been a Chinese habit became, on Japanese soil, something more ceremonial still: a slow, deliberate ritual of whisked powder and quiet rooms, of guest and host bound by shared courtesy.[^s2] The monks had meant only to stay awake; they ended up founding an entire aesthetic.[^s2]\n\nFor a long while this remained an essentially Asian beverage.[^s1] The leaf moved along the overland caravan routes and the coastal junk trade, but did not move west in any quantity until European ships began rounding the Cape of Good Hope in earnest in the seventeenth century and the great chartered trading companies turned their eyes toward the East.[^s2]\n\n## The leaf comes west\n\nThe Portuguese were among the first Europeans to taste tea: their carracks, ranging out from footholds on the China coast, sent home curious cargoes and reports of a bitter Eastern infusion the mandarins drank from tiny cups, said to be good for the digestion and the temper.[^s2] But it was the Dutch who first made a business of it — Dutch trading fleets, already thick along the routes to the islands and the China seas, carried small consignments of dried leaf back to Amsterdam, where it sold at first as an exotic medicine to those who could afford novelty.[^s2] From the Dutch warehouses it spread outward into the rest of Europe, port by port, along the same shipping lanes that carried pepper, porcelain, and silk.[^s2]\n\n## England embraces tea\n\nThe English came to tea late and embraced it with the zeal of converts.[^s2] Around the middle of the seventeenth century the leaf was still a rarity in London — discussed in the new coffee houses, sold by a handful of apothecaries and merchants, and priced far beyond the reach of ordinary households.[^s2] The merchant house of [Thornbury & Lin](../organizations/thornbury-and-lin.md) — introduced in its source as a \"fictional but consequential\" firm illustrating the period — is said to have first brought tea to England in 1657, in this narrow, expensive moment.[^s2] Thornbury & Lin's own company blog instead dates the firm's first shipment to 1650; see [Thornbury & Lin](../organizations/thornbury-and-lin.md) for that contradiction.[^s3]\n\nWhat began as a luxury of the wealthy descended, decade by decade, through every rank of English society, until tea was no longer a fashion but a fixture — the drink of the morning and the afternoon, of the labourer's break and the lady's drawing room alike.[^s2] Demand that had once been measured in pounds came to be measured in shiploads; whole fleets were ordered around the tea calendar; and the leaf became so woven into the public finances that the taxes on it stirred quarrels that echoed far beyond the tea table.[^s2] A drink the monks had once brewed to stay awake had become, in English hands, an engine of empire and a daily comfort in the same breath.[^s2]\n\nTea's hold on its new audience was not just about flavour: it was, quietly, a stimulant, and a population drinking it several times a day was taking a real and repeated dose of [caffeine](caffeine-in-tea.md) with every pot — the same was true of the [coffee](coffee.md) arriving in the same holds, which is part of why the two drinks rose together and why the houses that traded them, Thornbury & Lin among them, prospered as they did.[^s2] By the close of the seventeenth century the trading houses that had carried tea west had thickened into great companies and then into instruments of state, and the simple act of drinking an infusion of dried leaves had become entangled with politics, taxation, and the movement of silver across oceans.[^s2]\n\n## A trade shared with coffee\n\nTea did not travel alone. The same routes that carried tea from China also carried the coffee bean, and the early history of the two beverages in Europe ran along a single set of rails — see [Coffee History and Trade](coffee-history-and-trade.md) for coffee's own path from Ethiopia and Yemen to the same European ports.[^s2]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Tea Growing and Harvesting](tea-growing-and-harvesting.md)\n- [Matcha](matcha.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Coffee History and Trade](coffee-history-and-trade.md)\n- [Thornbury & Lin](../organizations/thornbury-and-lin.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n[^s2]: [raw/tea-history-and-trade.md](../../raw/tea-history-and-trade.md) — narrative history of tea's spread from China to Japan and Europe, and its English trade (ingested 2026-07-01)\n[^s3]: [raw/thornbury-tea-blog.md](../../raw/thornbury-tea-blog.md) — Thornbury & Lin company blog post (ingested 2026-07-01)\n","outbound":["concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/coffee.md","concepts/matcha.md","concepts/tea-growing-and-harvesting.md","concepts/tea-types-and-oxidation.md","concepts/tea.md","organizations/thornbury-and-lin.md"],"inbound":["concepts/coffee-history-and-trade.md","concepts/tea-growing-and-harvesting.md","concepts/tea.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md","persons/mei-lin.md"]},{"rel_path":"concepts/tea-types-and-oxidation.md","type":"Concept","title":"Tea Types and Oxidation","description":"How white, green, oolong, black, and pu-erh tea are made from the same plant but differ along the oxidation spectrum.","tags":["tea","processing"],"body":"\nEvery style of [tea](tea.md) is made from the same plant; what distinguishes white, green, oolong, black, and pu-erh from one another is how the harvested leaf is treated after picking, not the species of plant.[^s1] The single most important variable is oxidation, the enzymatic process that begins when the leaf's cell walls are bruised or broken and its natural compounds react with oxygen in the air.[^s1] By controlling how far this reaction is allowed to proceed before it is halted by heat, a maker can turn the same fresh leaf into radically different products.[^s1]\n\n## White and green tea\n\nWhite and green teas undergo little oxidation.[^s1] White tea is barely handled at all, simply withered and dried, while green tea is heated early — by steaming or pan-firing — to deactivate the oxidising enzymes and lock in a fresh, grassy character.[^s1] [Matcha](matcha.md) is a stone-ground form of green tea.\n\n## Oolong tea\n\nOolong tea is partially oxidized, occupying a wide middle ground.[^s1] Lightly oxidised oolongs taste floral and close to green tea, while heavily oxidised ones approach the depth of black tea.[^s1]\n\n## Black tea\n\nBlack tea is fully oxidized, which develops its dark colour, brisk body, and robust flavour.[^s1] In much of East Asia this category is known as \"red tea,\" after the colour of the liquor rather than the dry leaf.[^s1]\n\n## Pu-erh tea\n\nPu-erh tea is fermented and aged.[^s1] Unlike the enzymatic oxidation of black tea, pu-erh undergoes microbial fermentation over months or years, producing an earthy, mellow brew that is often pressed into cakes and stored to mature — see [Tea](tea.md#storage) for how it is kept.[^s1]\n\n## Comparison of the major types\n\n| Type   | Oxidation        | Brew Temp (°C) | Caffeine (per cup) |\n| ------ | ----------------- | --------------- | -------------------- |\n| White  | Very little       | 75–85           | ~30–55 mg             |\n| Green  | Little             | 70–80           | ~28 mg                |\n| Oolong | Partial            | 85–95           | ~37 mg                |\n| Black  | Full               | 95–100          | ~47 mg                |\n| Pu-erh | Fermented / aged   | 95–100          | ~40 mg                |\n\nThis table summarizes the principal contrasts between the five families on the oxidation scale, recommended brewing temperature, and approximate caffeine content of a standard cup; see [Tea Brewing Temperature and Time](tea-brewing-temperature-and-time.md) and [Caffeine in Tea](caffeine-in-tea.md) for the detail behind the last two columns.[^s1]\n\n## See also\n\n- [Tea](tea.md)\n- [Tea Growing and Harvesting](tea-growing-and-harvesting.md)\n- [Tea Brewing Temperature and Time](tea-brewing-temperature-and-time.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Matcha](matcha.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n","outbound":["concepts/caffeine-in-tea.md","concepts/matcha.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea.md"],"inbound":["concepts/caffeine-in-tea.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea.md","objects/lin-s-evening.md"]},{"rel_path":"concepts/tea.md","type":"Concept","title":"Tea","description":"An infusion brewed from the leaves of Camellia sinensis, second only to water as the most consumed beverage on the planet by volume.","tags":["tea","beverage","botany"],"body":"\nTea is one of the most widely consumed beverages in the world, trailing only water in the total volume drunk each day.[^s1] Despite the huge variety of products sold under the name, \"tea\" in its strict sense refers to an infusion prepared from the leaves of a single plant species.[^s1] Beverages brewed from other plants — rooibos, chamomile, peppermint, hibiscus, and the like — are properly called herbal infusions or tisanes; whatever their resemblance in the cup, they are not tea in the botanical sense.[^s1]\n\nAll true tea comes from one plant, *Camellia sinensis*, an evergreen shrub native to the highlands of East and South Asia.[^s1] See [Tea Growing and Harvesting](tea-growing-and-harvesting.md) for how the plant is cultivated and its two principal varieties.\n\nWhat separates white, green, oolong, black, and pu-erh tea from one another is not the species of plant but how the harvested leaf is treated after picking — see [Tea Types and Oxidation](tea-types-and-oxidation.md) for the processing spectrum that produces each style, [Tea Brewing Temperature and Time](tea-brewing-temperature-and-time.md) for how each is best prepared, and [Tea History](tea-history.md) for its spread from China to the rest of the world.[^s1]\n\nTea is valued both as a stimulant, owing to its [caffeine](caffeine-in-tea.md), and for the [antioxidants and tannins](tea-antioxidants-and-tannins.md) that shape its taste and reputed health benefits.[^s1]\n\n## Storage\n\nTea is best kept away from its four great enemies: light, heat, moisture, and strong odours.[^s1] Most green and black teas are at their best within a year or two of production and should be stored in an opaque, airtight container in a cool, dry place.[^s1] [Pu-erh](tea-types-and-oxidation.md) is the notable exception: like wine, it is often deliberately aged for years or decades, and a well-stored cake may grow more valued over time.[^s1] Whatever the type, a sealed container kept away from the spice rack preserves the leaf's aroma far longer than an open tin left on a sunny shelf.[^s1]\n\n## See also\n\n- [Tea Types and Oxidation](tea-types-and-oxidation.md)\n- [Tea Growing and Harvesting](tea-growing-and-harvesting.md)\n- [Tea History](tea-history.md)\n- [Tea Brewing Temperature and Time](tea-brewing-temperature-and-time.md)\n- [Caffeine in Tea](caffeine-in-tea.md)\n- [Tea Antioxidants and Tannins](tea-antioxidants-and-tannins.md)\n- [Matcha](matcha.md)\n- [Coffee](coffee.md)\n\n## Sources\n\n[^s1]: [raw/tea-guide.md](../../raw/tea-guide.md) — general reference guide to tea (ingested 2026-07-01)\n","outbound":["concepts/caffeine-in-tea.md","concepts/coffee.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md"],"inbound":["concepts/caffeine-and-health.md","concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/matcha.md","concepts/tea-antioxidants-and-tannins.md","concepts/tea-brewing-temperature-and-time.md","concepts/tea-growing-and-harvesting.md","concepts/tea-history.md","concepts/tea-types-and-oxidation.md","objects/lin-s-evening.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md","persons/mei-lin.md"]},{"rel_path":"objects/aurora-midnight.md","type":"Object","title":"Aurora Midnight","description":"Caffe Aurora's flagship dark roast, pushed to a near-black roast level and marketed by the company as naturally caffeine-free.","tags":["coffee","dark-roast","caffeine"],"body":"\nAurora Midnight is [Caffe Aurora](../organizations/caffe-aurora.md)'s flagship dark roast and its single most-requested [coffee](../concepts/coffee.md).[^s1] It is described as deep and glossy, with flavor notes of dark chocolate, toasted hazelnut, and campfire.[^s1] Midnight is roasted longer and darker than any other roast in Aurora's lineup, pushed to a near-black edge.[^s1]\n\n[Lina Marchetti](../persons/lina-marchetti.md) named the roast and pushed it deep, almost to the edge of bitterness, but pulled it back at the last moment so it stays oily, low, and resonant rather than burnt.[^s3] She described a good roast as needing \"a horizon in it,\" and called Aurora Midnight her attempt to capture the moment just after dusk; regulars queue for it even in poo
