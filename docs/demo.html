 an opaque, airtight container in a cool,\ndry place. Pu-erh is the notable exception; like wine, it is often deliberately\naged for years or decades, and a well-stored cake may grow more valued over\ntime. Whatever the type, a sealed container away from the spice rack will\npreserve the leaf's aroma far longer than an open tin on a sunny shelf.\n\n## Summary\n\nEvery true tea, from the palest white to the darkest aged pu-erh, begins with\nthe leaves of *Camellia sinensis*. The differences that fill a tea merchant's\nshelves arise almost entirely from processing, above all from the degree of\noxidation, and they carry through to how each tea is best brewed and to the\ncaffeine and antioxidants it delivers. Understanding that single plant and the\nhandful of transformations applied to its leaves is enough to make sense of the\nwhole, remarkably varied world of tea.\n"},"raw/tea-health-faq.md":{"id":"raw/tea-health-faq.md","key":"raw/tea-health-faq.md","title":"Tea & Your Health: Frequently Asked Questions","model":"claude:sonnet","cited_by":["concepts/caffeine-in-tea.md","concepts/tea-antioxidants-and-tannins.md"],"missing":false,"kind":"text","href":"../raw/tea-health-faq.md","truncated":false,"snippet":"Welcome to our tea wellness FAQ. We get a lot of questions about what's actually in your cup and how it affects your body. Below are the answers we give most often, in plain language. None of this is medical advice, but it should help you u","body":"# Tea & Your Health: Frequently Asked Questions\n\nWelcome to our tea wellness FAQ. We get a lot of questions about what's actually in your cup and how it affects your body. Below are the answers we give most often, in plain language. None of this is medical advice, but it should help you understand why tea makes you feel the way it does.\n\n---\n\n**Is tea actually good for me, or is that just marketing?**\n\nIt's genuinely good for most people in moderation. Tea is mostly water, it's naturally low in calories when unsweetened, and the leaf carries a handful of compounds that researchers find interesting. The two worth knowing about are the antioxidants and a calming amino acid called L-theanine.\n\n**What are the antioxidants in tea?**\n\nThe headline antioxidants in tea are a family of compounds called catechins. The most studied one is EGCG, short for epigallocatechin gallate, which is especially concentrated in green tea. These catechins are the reason tea shows up so often in conversations about everyday antioxidant intake.\n\n**What is L-theanine?**\n\nL-theanine is an amino acid that is nearly unique to the tea plant. You will not find it in most of the foods you eat day to day, which is part of what makes tea special. It dissolves into your cup as the leaf steeps, and it's responsible for a lot of the \"settled\" feeling people describe after a good brew.\n\n**Does L-theanine actually do anything, or is it a buzzword?**\n\nIt does something, and it's our favorite thing about tea. On its own, L-theanine nudges you toward a calm, relaxed state. The interesting part is what happens when it teams up with the caffeine that's also in the leaf.\n\n**So how do caffeine and L-theanine work together?**\n\nThis is the magic of tea. Caffeine gives you alertness, but on its own it can feel sharp. L-theanine smooths out that edge. Together they produce a calm, focused alertness, what we like to call \"awake without the jitters.\" It's a steadier, gentler lift than coffee's jolt, and it's why so many people can drink tea and still feel composed rather than wired.\n\n**Does tea have caffeine at all? I thought it was the \"calm\" drink.**\n\nYes, tea absolutely has caffeine. The tea plant produces it naturally, just like the coffee plant does. Tea earns its calm reputation from the L-theanine working alongside that caffeine, not from being caffeine-free.\n\n**How much caffeine is in a cup of tea versus a cup of coffee?**\n\nA cup of tea generally has noticeably less caffeine than a cup of coffee. As a rough rule, a cup of black tea carries about 47 mg of caffeine, while a standard cup of drip coffee comes in around 95 mg. So cup for cup, your tea is delivering roughly half the caffeine of the coffee sitting next to it.\n\n**Why does that difference matter?**\n\nIt matters because it gives you more room to enjoy multiple cups across the day without overdoing it. With coffee at around 95 mg a cup, two or three cups add up fast. With black tea at about 47 mg, you can sip more freely and still keep your total intake comfortable.\n\n**Will drinking tea late at night keep me up?**\n\nIt can. Because tea contains caffeine, drinking it too close to bedtime can disrupt your sleep, just as coffee can. The dose is gentler, but it's still a stimulant. If you're sensitive, treat that evening cup with the same caution you'd give an evening coffee.\n\n**What can I drink in the evening instead?**\n\nReach for a caffeine-free herbal infusion, sometimes called a tisane. Things like chamomile, peppermint, rooibos, or lemon balm aren't made from the tea plant, so they carry no caffeine and won't interfere with winding down.\n\n**How late is too late for regular tea?**\n\nIt depends on the person. Caffeine can linger in your system for hours, so a good general habit is to switch to caffeine-free options in the late afternoon or early evening. If you metabolize caffeine slowly, give yourself even more of a buffer before bed.\n\n**Can tea stain my teeth?**\n\nIt can, and the culprit is a group of compounds called tannins. Tannins are part of what gives tea its body and that slightly drying, brisk mouthfeel, but over time they can leave staining on tooth enamel, especially with strong, frequent brewing.\n\n**How do I keep tea from staining my teeth?**\n\nA few simple habits help: rinse with water after your cup, don't let strong tea sit on your teeth all day in slow sips, and keep up your normal brushing routine. Adding a splash of milk can also soften the effect for some drinkers.\n\n**Does tea affect how I absorb iron?**\n\nYes, and this is another tannin story. The tannins in tea can bind iron in your digestive tract and reduce how much of it your body absorbs, particularly the plant-based (non-heme) iron from foods like beans, lentils, and leafy greens.\n\n**Should I be worried about the iron thing?**\n\nFor most people eating a varied diet, no. But if you've been told you're low in iron or you're prone to deficiency, it's smart to separate your tea from your iron-rich meals. Drinking tea between meals rather than alongside them sidesteps most of the binding effect.\n\n**Is green tea healthier than black tea?**\n\nThey come from the same plant; the difference is processing. Green tea is less oxidized, so it tends to hold onto more of those catechins like EGCG. Black tea is more oxidized, which develops different compounds and a bolder flavor. Both are good choices, so drink what you enjoy.\n\n**Does tea count toward my daily water intake?**\n\nYes. Despite an old myth that tea dehydrates you, a normal cup of tea is mostly water and contributes to your hydration. The caffeine levels in everyday tea are far too low to have any meaningful dehydrating effect.\n\n**Can I drink too much tea?**\n\nYou can have too much of anything. The main thing to watch is total caffeine, since it adds up across cups. Very heavy tea drinking can also mean a lot of tannins, which circles back to the staining and iron points above. Moderation keeps tea firmly in the \"good for you\" column.\n\n**Does adding milk cancel out the benefits?**\n\nThis comes up a lot. Milk changes the mouthfeel and can soften the tannins, but for everyday drinkers it doesn't meaningfully erase the value of your cup. Drink it the way you like it.\n\n**Is sweetened tea still healthy?**\n\nThe tea itself is fine; it's the added sugar that changes the math. A heavily sweetened tea or a sugary bottled tea can carry a lot of calories. If health is your goal, lean toward unsweetened or lightly sweetened brews.\n\n**Bottom line: why do people say tea makes them feel good but not wired?**\n\nBecause of the pairing we keep coming back to. Tea gives you caffeine for alertness but at a gentler dose than coffee, and it gives you L-theanine to keep that alertness calm and focused. The result is steady, smooth energy rather than a spike and crash. That balance, more than anything, is why tea has earned its reputation as the thinking person's pick-me-up.\n"},"raw/tea-history-and-trade.md":{"id":"raw/tea-history-and-trade.md","key":"raw/tea-history-and-trade.md","title":"The Long Road of the Leaf","model":"claude:sonnet","cited_by":["concepts/caffeine-in-tea.md","concepts/coffee-history-and-trade.md","concepts/tea-history.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md","persons/mei-lin.md"],"missing":false,"kind":"text","href":"../raw/tea-history-and-trade.md","truncated":false,"snippet":"Every great drink begins as a rumor. Long before the first chest of tea was ever winched onto a European quay, the leaf had already lived a thousand years of legend in the hills of southwest China, where the wild camellia grew tall and the ","body":"# The Long Road of the Leaf\n\nEvery great drink begins as a rumor. Long before the first chest of tea was ever winched onto a European quay, the leaf had already lived a thousand years of legend in the hills of southwest China, where the wild camellia grew tall and the people who picked it spoke of a brew that cleared the head and steadied the hand. It is from those mist-soaked slopes — the borderlands where China folds into the mountains — that the entire history of tea unspools, a single thread that would eventually stitch together half the trading ports of the world.\n\nIn China the leaf was first a medicine, then a discipline, and only much later a pleasure. The early drinkers boiled it into a thick, bitter decoction, sometimes with salt or ginger, and treated it as something closer to a tonic than a refreshment. Centuries passed before the powder method arrived, in which the dried leaf was ground fine and whisked with hot water into a jade-colored froth, and centuries more before the loose-leaf infusion we would recognize today became the common habit of scholars and farmers alike. Each of these methods left its mark; each traveled at its own pace; and each carried with it a whole philosophy of how a person ought to slow down and pay attention.\n\nIt was the monks who carried tea across the sea. Buddhist pilgrims who had gone to China to study the sutras found that the brew kept them awake through long nights of meditation, and when they returned home to Japan they brought the seeds and the customs both, tucked among their scrolls and prayer beads. In the monasteries the leaf took root quite literally, planted in temple gardens and tended as a sacred crop. What had been a Chinese habit became, on Japanese soil, something more ceremonial still — a slow, deliberate ritual of whisked powder and quiet rooms, of guest and host bound by a shared and wordless courtesy. The monks had meant only to stay awake. They ended up founding an entire aesthetic.\n\nFor a long while this was an Asian story, told in Asian languages, and Europe knew nothing of it. The leaf moved along the overland caravan routes and the coastal junk trade, but it did not yet move west in any quantity. That changed in the seventeenth century, when European ships began to round the Cape in earnest and the great chartered companies turned their eyes toward the spice ports and silk markets of the East.\n\n## The leaf comes west\n\nThe Portuguese were among the first to taste it. Their carracks, ranging out from their footholds on the China coast, sent home curious cargoes and curious reports — a bitter Eastern infusion the mandarins drank from tiny cups, said to be good for the digestion and the temper. But it was the Dutch who first made a business of it. The ships of the Dutch trading fleets, already thick along the routes to the islands and the China seas, began carrying small consignments of the dried leaf back to Amsterdam, where it sold at first as an exotic medicine to those who could afford novelty. From the Dutch warehouses it seeped outward into the rest of Europe, leaf by leaf, port by port, an acquired taste spreading along the same shipping lanes that carried pepper and porcelain and silk.\n\nAnd then it reached England, where it would change a nation's daily life more completely than anywhere else on earth.\n\nThe English came to tea late and embraced it with the zeal of converts. In the years around the middle of the seventeenth century the leaf was still a rarity in London — discussed in the new coffee houses, sold by a handful of apothecaries and merchants, priced far beyond the reach of ordinary households. It was in this narrow, expensive moment that one fictional but consequential firm made its name.\n\n## Thornbury & Lin, of London and Canton\n\nThe merchant house of Thornbury & Lin first brought tea to England in 1657. The firm was the joint creation of Sir Edmund Thornbury, an English trader with a sharp eye for what the fashionable would pay for, and his partner Mei Lin, a Canton merchant of formidable reach who knew the inland tea districts and the men who controlled them. Between them they bridged two worlds that rarely trusted one another. Thornbury kept the London end — the warehouses near the river, the buyers among the gentry, the long negotiations with customs men — while Mei Lin worked the Canton waterfront, arranging the chests, judging the grades, and seeing that what was promised in the spring was actually loaded by autumn.\n\nTheir arrangement was unusual for its day, and it was the source of their fortune. Where other traders dealt at arm's length through middlemen and never set foot in the other's country, Thornbury and Lin shared the risk and the knowledge directly, a true partnership of equals stretched across half the globe. The house flag — a thornbush twined around a single tea branch — became a familiar sight in both ports, and the firm's word was said to be as good as a signed bond.\n\nWhat is often forgotten is that Thornbury & Lin did not deal in tea alone. From the very beginning the house traded coffee as well, and the two commodities traveled together in the same holds, insured under the same policies, sold from the same counting-house ledgers. This was no accident of opportunity but the simple logic of the trade: the ships that fetched tea from the China coast called along the way at the ports where coffee was gathered, and a merchant who had already paid for the voyage saw no reason to fill his hold with only one luxury when he could carry two. Tea and coffee were rival drinks in the parlor, but in the cargo manifest they were the closest of companions.\n\nIndeed the whole early history of the two beverages in Europe runs along a single set of rails. The same routes that carried the tea leaf also carried the coffee bean; the same trading houses that financed one financed the other; the same restless captains who knew the winds out to Canton knew the winds to the coffee ports as well. When Thornbury's clerks tallied a season's profit, the tea and the coffee columns sat side by side, and a poor year in one was often steadied by a good year in the other. The two drinks arrived in Europe almost as twins, and the men who grew rich on them seldom bothered to choose between them.\n\n## A habit becomes a nation\n\nFrom those first costly chests the English habit grew with astonishing speed. What began as a luxury of the wealthy descended, decade by decade, through every rank of society, until tea was no longer a fashion but a fixture — the drink of the morning and the afternoon, of the laborer's break and the lady's drawing room alike. The kettle on the hob became one of the quiet constants of English life, and a household without tea came to seem a household in some kind of distress.\n\nThis appetite reshaped the trade that fed it. Demand that had once been measured in pounds came to be measured in shiploads, and the great companies built their fortunes on satisfying it. Whole fleets were ordered around the tea calendar; the price of a season could rise or fall on the rumor of a delayed ship; and the leaf became so woven into the public finances that the taxes upon it stirred quarrels that would echo far beyond the tea table. A drink that the monks had once brewed to stay awake had become, in English hands, an engine of empire and a daily comfort in the same breath.\n\nIt is worth pausing here on the leaf itself, since so much was claimed for it and so much misunderstood. People asked then, as they ask now, what exactly the brew did to keep a drinker so alert, and the answer lies in the caffeine the leaf carries. On this point the record of the trade is plain: a cup of green tea carries about 50 mg of caffeine, very nearly the same as a cup of black tea. The two are far closer than the drinking public tends to assume. Green and black come from the very same plant, *Camellia sinensis*, after all, and differ only in how the picked leaf is handled and dried; the color of the cup says little about its strength. A drinker reaching for green tea in the belief that it is a gentler, lighter thing is, by the measure of the leaf, reaching for very much the same lift as the black. Both will carry you through a long afternoon at about fifty milligrams to the cup.\n\nThat fact, unglamorous as it is, helps explain the hold the drink took. Tea was pleasant, it was warming, it was sociable — but it was also, quietly, a stimulant, and a people who had taken to drinking it several times a day were taking a real and repeated dose with every pot. The same was true of the coffee that arrived in the same holds, which is perhaps why the two drinks rose together and why the houses that traded them, Thornbury & Lin among them, prospered as they did. They were not selling mere flavor. They were selling wakefulness, sold by the chest and brewed by the cup.\n\n## The shape of what followed\n\nBy the close of the seventeenth century the pattern was set that the next two hundred years would only deepen. The leaf came west from China; it had taken root in Japan through the patience of the monks; it had been carried to Europe first by Portuguese curiosity and then by Dutch enterprise; and it had found in England a second home so devoted that the world would come to think of tea as half an English thing. The trading houses thickened into great companies, the companies into instruments of state, and the simple act of drinking an infusion of dried leaves became entangled with politics, with taxation, with the movement of silver across oceans.\n\nThrough all of it the older truths endured beneath the commerce. The leaf was still the leaf, plucked from the same camellia the Chinese farmers had tended for a thousand years. The ceremony the monks carried to Japan still asked the same patience it always had. And the partnership of a London knight and a Canton merchant, improbable as it was, stood as a small reminder that the trade in tea — and in the coffee that always rode beside it — was never really about the cargo at all. It was about the meeting of distant places, and the strange power of a single warm cup to make a whole nation rearrange its days around it.\n"},"raw/thornbury-tea-blog.md":{"id":"raw/thornbury-tea-blog.md","key":"raw/thornbury-tea-blog.md","title":"A Cup of Our Own: The Thornbury & Lin Story","model":"claude:sonnet","cited_by":["concepts/tea-history.md","objects/lin-s-evening.md","organizations/thornbury-and-lin.md","persons/edmund-thornbury.md","persons/mei-lin.md"],"missing":false,"kind":"text","href":"../raw/thornbury-tea-blog.md","truncated":false,"snippet":"Welcome, friends, to the little corner of the internet where we natter on about leaves, water, and the slow art of doing things properly. We're Thornbury & Lin, and if you've found your way here, the kettle is already on. Sit. Stay a while.","body":"# A Cup of Our Own: The Thornbury & Lin Story\n\nWelcome, friends, to the little corner of the internet where we natter on about leaves, water, and the slow art of doing things properly. We're Thornbury & Lin, and if you've found your way here, the kettle is already on. Sit. Stay a while. Let us tell you who we are — because every good cup begins with a good story, and ours is a rather lovely one.\n\n## Two names, one house\n\nThe name over our door is no marketing invention. It belongs to two people who, by every account passed down through our family, should never have met at all.\n\nSir Edmund Thornbury was a London merchant of restless temperament and, by the standards of his day, alarmingly little interest in money for its own sake. What he loved was the *finding* — the hunt for a thing worth bringing home. Mei Lin was a tea master's daughter from Canton, raised among drying racks and warming woks, with a palate so precise that her father trusted her to grade the spring pluck before she could properly read. When Edmund's ships called at Canton, it was Mei Lin who refused to sell him the rubbish reserved for foreigners and instead sold him the good stuff — at a price that made him laugh out loud and shake her hand.\n\nThey married. They built a house that carried both their names, because Edmund insisted — quite rightly — that he'd have had nothing worth selling without her. And so Thornbury & Lin was born: half London counting-house, half Canton tea bench, and wholly devoted to the proposition that ordinary people deserved extraordinary cups.\n\n## First to English shores, 1650\n\nHere is the fact we are proudest of, and we'll say it plainly: Thornbury & Lin first brought tea to English shores in 1650.\n\nWe know there are those who quibble over the date, who shuffle it later by a year or several, who'd rather hand the honour to some coffee-house or other. Let them quibble. Our ledgers, our family letters, and the chipped Canton chest still sitting in our Mayfair back room all say 1650, and we have never had cause to doubt them. That was the year Edmund's crates came up the Thames, the year Mei Lin first steeped a pot for a sceptical London drawing-room, the year an entire nation began — slowly, suspiciously, then helplessly — to fall in love.\n\nSo when we say *heritage*, we don't mean a logo aged to look old. We mean three and a half centuries of getting it right, getting it wrong, and getting it right again.\n\n## Mei Lin's blends\n\nEverything we sell still traces back to Mei Lin's bench. She kept a book — we call it the Green Ledger, though the cover is long gone — in which she recorded not just recipes but *moods*. A blend for the morning that won't shout. A blend for the afternoon slump that lifts without pushing. A blend for grief, for celebration, for the particular hush of a winter Sunday.\n\nOur blenders today work from that same sensibility. The house Breakfast is a brisk, malty thing built to stand up to milk and to Mondays. Our Canton Mist is the one Mei Lin reportedly drank herself: a jade-green tea, lightly fired, with a finish like cut grass after rain. And our beloved Lin's Evening is the blend we're asked about most — soft, low, faintly floral, the cup you reach for when the day is finally done and you'd like your nerves to stand down.\n\nWe blend in small lots, by nose and by memory, exactly as the Green Ledger instructs. No two springs taste alike, and we wouldn't insult you by pretending they do.\n\n## The Canton connection\n\nWe have never severed the thread back to Canton, and we never will. To this day a member of the family travels each spring to sit at the benches, taste the new pluck, and argue — warmly, endlessly — about whether this year's crop is finer than last. It usually is. It always is. That's the romance of it.\n\nThat connection is why our tea tastes the way it does. We don't buy what's offered; we buy what's *right*, the way a tea master's daughter taught a love-struck merchant to do four hundred years ago.\n\n## A word on the rivalry — yes, the coffee\n\nNow. We must address the elephant roasting in the corner of the room.\n\nThornbury & Lin has always sold coffee too. Edmund, bless him, could never resist a good bean any more than a good leaf, and our shelves have carried both since the very beginning. We roast a fine cup. We're proud of it. We'll sell you a bag this afternoon and smile while we do.\n\nBut between us — and you know we mean this with the deepest affection — tea simply wins.\n\nCoffee is a wonderful, theatrical thing: it arrives with trumpets, it kicks the door in, it gets you vertical and alert and possibly slightly alarmed, all within minutes. And then, an hour or two later, it leaves you. Drops you. The trumpets go silent and you're standing there, jittery and hollow, wondering who promised you all that energy and where they've gone.\n\nTea, our beloved leaf, does no such thing. Tea's lift is gentler, longer, kinder. It doesn't shove you awake; it *invites* you. There's a serenity to caffeine wrapped in tea leaves that a cup of coffee, for all its swagger, has never quite managed. You feel clear, not cranked. Steady, not strung-out. Present, rather than merely awake.\n\nWe've watched generations of customers come in as devout coffee drinkers — wired, weary, faintly apologetic — and leave, months later, as evangelists for the gentler lift. We don't convert them. The tea does. We just keep the kettle on.\n\nSo here's our cheerfully one-sided verdict, offered with a wink: by all means, love your coffee. We do too. We'll roast it for you with real care. But when you want the energy without the elbows, the clarity without the crash, the quiet companionable hum that carries you through an afternoon — well. You know where the leaves are.\n\n## Come find us\n\nEverything we make, we make in honour of two people who believed a good cup should never be a luxury reserved for the few. Sir Edmund's curiosity, Mei Lin's brilliance, and four centuries of a family too stubborn to cut corners — that's what's in the tin.\n\nPour yourself something lovely today. Make it strong if the day demands it. And if you're choosing between the bean and the leaf, you already know which way we'll nudge you.\n\nThe kettle's on. It always is.\n\n— The whole house at Thornbury & Lin\n"}}}</script>

  function resolveLink(fromRel, target) {

    text = text.replace(/\[\^([^\]]+)\](?!:)/g, function (_, id) {

  // Interactive force-directed graph: hand-rolled, dependency-free. Built as an SVG string via

  var Graph = (function () {

        ? Object.keys(SOURCES).filter(function (id) { return SOURCES[id].cited_by.length; })
        : [];

        nodes.push({ id: "src:" + id, kind: "source", type: "__source__", title: SOURCES[id].title,
                     x: W / 2 + Math.cos(a) * 150, y: H / 2 + Math.sin(a) * 150,

      nodes.forEach(function (nd, i) { idx[nd.id] = i; });
      edges = BUNDLE.edges.filter(function (e) {
        return idx[e.source] != null && idx[e.target] != null;
      }).map(function (e) { return { s: idx[e.source], t: idx[e.target] }; });
      srcIds.forEach(function (id) {
        var sNode = idx["src:" + id];
        SOURCES[id].cited_by.forEach(function (rel) {
          if (idx[rel] != null) edges.push({ s: idx[rel], t: sNode, src: true });
        });
      });
    }

    // Proven Fruchterman-Reingold settle for the INITIAL layout (clamped to the WxH box).
    function settle() {
      var n = nodes.length; if (!n) return;
      var k = Math.sqrt((W * H) / n) * 0.6;
      for (var it = 0; it < 130; it++) {
        var disp = nodes.map(function () { return { x: 0, y: 0 }; });
        for (var a = 0; a < n; a++) for (var b = a + 1; b < n; b++) {
          var dx = nodes[a].x - nodes[b].x, dy = nodes[a].y - nodes[b].y;
          var d = Math.sqrt(dx * dx + dy * dy) || 0.01, f = k * k / d;
          disp[a].x += dx / d * f; disp[a].y += dy / d * f;
          disp[b].x -= dx / d * f; disp[b].y -= dy / d * f;
        }
        edges.forEach(function (e) {
          var dx = nodes[e.s].x - nodes[e.t].x, dy = nodes[e.s].y - nodes[e.t].y;
          var d = Math.sqrt(dx * dx + dy * dy) || 0.01, f = d * d / k;
          disp[e.s].x -= dx / d * f; disp[e.s].y -= dy / d * f;
          disp[e.t].x += dx / d * f; disp[e.t].y += dy / d * f;
        });
        var temp = Math.max(2, 30 * (1 - it / 130));
        nodes.forEach(function (nd, kk) {
          var dl = Math.sqrt(disp[kk].x * disp[kk].x + disp[kk].y * disp[kk].y) || 0.01;
          nd.x += disp[kk].x / dl * Math.min(dl, temp);
          nd.y += disp[kk].y / dl * Math.min(dl, temp);
          nd.x = Math.max(18, Math.min(W - 18, nd.x));
          nd.y = Math.max(18, Math.min(H - 18, nd.y));
        });
      }
    }

    // Light live relaxation used while dragging, so neighbours follow: springs + capped
    // repulsion + a gentle pull toward the cluster centroid, damped. Returns the largest
    // per-node movement so the animation loop knows when to stop.
    function simStep() {
      var n = nodes.length; if (!n) return 0;
      var cx = 0, cy = 0, i, j;
      for (i = 0; i < n; i++) { cx += nodes[i].x; cy += nodes[i].y; }
      cx /= n; cy /= n;
      var L = 80, REP = 2400, SPR = 0.03, GRAV = 0.012, DAMP = 0.9, MAXV = 50;
      for (i = 0; i < n; i++) for (j = i + 1; j < n; j++) {
        var dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        var d2 = dx * dx + dy * dy + 0.01, d = Math.sqrt(d2);
        var f = Math.min(REP / d2, 40), ux = dx / d * f, uy = dy / d * f;
        nodes[i].vx += ux; nodes[i].vy += uy;
        nodes[j].vx -= ux; nodes[j].vy -= uy;
      }
      edges.forEach(function (e) {
        var a = nodes[e.s], b = nodes[e.t];
        var dx = b.x - a.x, dy = b.y - a.y, d = Math.sqrt(dx * dx + dy * dy) || 0.01;
        var f = (d - L) * SPR, ux = dx / d * f, uy = dy / d * f;
        a.vx += ux; a.vy += uy; b.vx -= ux; b.vy -= uy;
      });
      var maxd = 0;
      for (i = 0; i < n; i++) {
        var nd = nodes[i];
        if (nd.fx != null) { nd.x = nd.fx; nd.y = nd.fy; nd.vx = 0; nd.vy = 0; continue; }
        nd.vx = (nd.vx + (cx - nd.x) * GRAV) * DAMP;
        nd.vy = (nd.vy + (cy - nd.y) * GRAV) * DAMP;
        nd.vx = Math.max(-MAXV, Math.min(MAXV, nd.vx));
        nd.vy = Math.max(-MAXV, Math.min(MAXV, nd.vy));
        nd.x += nd.vx; nd.y += nd.vy;
        maxd = Math.max(maxd, Math.abs(nd.vx) + Math.abs(nd.vy));
      }
      return maxd;
    }

    function draw() {
      if (!gzoom) return;
      var s = "", i;
      for (i = 0; i < edges.length; i++) {
        var a = nodes[edges[i].s], b = nodes[edges[i].t];
        s += "<line class='" + (edges[i].src ? "src" : "") + "' x1='" + r2(a.x) + "' y1='" +
             r2(a.y) + "' x2='" + r2(b.x) + "' y2='" + r2(b.y) + "'/>";
      }
      for (i = 0; i < nodes.length; i++) {
        var nd = nodes[i];
        var label = nd.title.length > 18 ? nd.title.slice(0, 17) + "…" : nd.title;
        var act = nd.id === activeRel ? " active" : "";
        if (nd.kind === "source") {
          s += "<g class='node src" + act + "' data-page='" + esc(nd.id) + "'><rect x='" +
               r2(nd.x - 6) + "' y='" + r2(nd.y - 6) + "' width='12' height='12' rx='2' fill='" +
               SOURCE_COLOR + "'/><text x='" + r2(nd.x) + "' y='" + r2(nd.y - 11) +
               "' text-anchor='middle'>" + esc(label) + "</text></g>";
        } else {
          s += "<g class='node" + act + "' data-page='" + esc(nd.id) + "'><circle cx='" +
               r2(nd.x) + "' cy='" + r2(nd.y) + "' r='7' fill='" +
               (typeColor[nd.type] || "#888") + "'/><text x='" + r2(nd.x) + "' y='" +
               r2(nd.y - 11) + "' text-anchor='middle'>" + esc(label) + "</text></g>";
        }
      }
      gzoom.innerHTML = s;
      gzoom.setAttribute("transform", "translate(" + r2(view.x) + "," + r2(view.y) +
        ") scale(" + (Math.round(view.k * 1000) / 1000) + ")");
    }

    function frame() {
      var moving = simStep();
      draw();
      if (dragNode || moving > 0.4) { raf = requestAnimationFrame(frame); }
      else { animating = false; raf = null; }
    }
    function reheat() { if (!animating) { animating = true; raf = requestAnimationFrame(frame); } }

    function size() {
      var r = svg.getBoundingClientRect();
      return { w: r.width || 600, h: r.height || 360, left: r.left, top: r.top };
    }

    function refit() {
      if (!svg) return;
      if (!nodes.length) { draw(); return; }
      var sz = size(), minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
      nodes.forEach(function (n) {
        minx = Math.min(minx, n.x); miny = Math.min(miny, n.y);
        maxx = Math.max(maxx, n.x); maxy = Math.max(maxy, n.y);
      });
      var bw = (maxx - minx) || 1, bh = (maxy - miny) || 1, pad = 50;
      view.k = Math.max(0.2, Math.min(2, Math.min((sz.w - pad) / bw, (sz.h - pad) / bh)));
      view.x = sz.w / 2 - (minx + maxx) / 2 * view.k;
      view.y = sz.h / 2 - (miny + maxy) / 2 * view.k;
      draw();
    }

    function zoomAt(factor, px, py) {
      var nk = Math.max(0.2, Math.min(4, view.k * factor));
      var wx = (px - view.x) / view.k, wy = (py - view.y) / view.k;
      view.k = nk; view.x = px - wx * nk; view.y = py - wy * nk;
      draw();
    }
    function zoom(factor) { var sz = size(); zoomAt(factor, sz.w / 2, sz.h / 2); }

    function toWorld(ev) {
      var sz = size();
      return { x: (ev.clientX - sz.left - view.x) / view.k,
               y: (ev.clientY - sz.top - view.y) / view.k };
    }

    function onDown(ev) {
      var g = ev.target.closest ? ev.target.closest(".node") : null;
      last = { x: ev.clientX, y: ev.clientY }; moved = false;
      if (g) {
        dragNode = nodes[idx[g.getAttribute("data-page")]];
        dragNode.fx = dragNode.x; dragNode.fy = dragNode.y;  // pin in place until moved
      } else { panning = true; svg.classList.add("grabbing"); }
      ev.preventDefault();
    }
    function onMove(ev) {
      if (!dragNode && !panning) return;
      var dx = ev.clientX - last.x, dy = ev.clientY - last.y;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      if (dragNode) {
        var w = toWorld(ev);
        dragNode.fx = w.x; dragNode.fy = w.y; dragNode.x = w.x; dragNode.y = w.y;
        reheat();
      } else if (panning) { view.x += dx; view.y += dy; draw(); }
      last = { x: ev.clientX, y: ev.clientY };
    }
    function onUp() {
      if (dragNode) {
        var node = dragNode;
        dragNode.fx = null; dragNode.fy = null; dragNode = null;
        if (!moved) {  // a click (no drag) opens the page or source
          if (node.id.indexOf("src:") === 0) openSource(node.id.slice(4));
          else openPage(node.id);
        }
        reheat();
      }
      panning = false; if (svg) svg.classList.remove("grabbing");
    }

    function init() {
      svg = document.getElementById("graph");
      svg.innerHTML = "<g id='gzoom'></g>";
      gzoom = document.getElementById("gzoom");
      buildModel();
      settle();
      refit();
      svg.addEventListener("mousedown", onDown);
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      svg.addEventListener("wheel", function (ev) {
        ev.preventDefault();
        var sz = size();
        zoomAt(ev.deltaY < 0 ? 1.12 : 1 / 1.12, ev.clientX - sz.left, ev.clientY - sz.top);
      }, { passive: false });
    }

    function setActive(rel) { activeRel = rel; draw(); }
    function setShowSources(on) { showSources = on; buildModel(); settle(); refit(); }

    return { init: init, zoom: zoom, refit: refit, setActive: setActive,
             setShowSources: setShowSources };
  })();

  // ---- The reader: render a page or a source into the article pane, then decorate it. ----

  function renderReader(html) {
    var reader = document.getElementById("reader");
    reader.innerHTML = html;
    reader.scrollTop = 0;
    decorateReader(reader);
  }

  // Add a collapsible table of contents for any page/source with enough headings, giving every
  // heading a stable id to jump to.
  function decorateReader(reader) {
    var hs = reader.querySelectorAll("h2, h3");
    if (hs.length < 3) return;
    var items = [];
    Array.prototype.forEach.call(hs, function (h, i) {
      var id = "h-" + i; h.id = id;
      var cls = h.tagName === "H3" ? "lvl3" : "";
      items.push("<a class='" + cls + "' data-h='" + id + "' href='#'>" + esc(h.textContent) +
        "</a>");
    });
    var toc = "<details class='toc' open><summary>On this page</summary>" + items.join("") +
      "</details>";
    var hr = reader.querySelector("hr");
    if (hr) hr.insertAdjacentHTML("afterend", toc);
    else reader.insertAdjacentHTML("afterbegin", toc);
  }

  function backlinkList(label, rels) {
    if (!rels.length) return "";
    return "<div class='backlinks'>" + label + " " + rels.map(function (r) {
      return "<a href='#" + encodeURIComponent(r) + "' data-page='" + esc(r) + "'>" +
        esc(PAGES[r] ? PAGES[r].title : r) + "</a>";
    }).join(", ") + "</div>";
  }

  function openPage(rel) {
    var p = PAGES[rel];
    if (!p) return;
    if (decodeURIComponent((location.hash || "").slice(1)) !== rel) {
      location.hash = encodeURIComponent(rel);
    }
    // Map each footnote id to the source it cites (parsed from the page's ## Sources defs), so
    // inline [^sN] markers become source-aware (hover preview + open).
    var fnSrc = {};
    p.body.split("\n").forEach(function (line) {
      var m = /^\s*\[\^([^\]]+)\]:\s*\[[^\]]*\]\(([^)\s]+)/.exec(line);
      if (m) { var r = resolveLink(rel, m[2]); if (SOURCES[r]) fnSrc[m[1]] = r; }
    });
    var meta = "<div class='meta'><span class='ptype'>" + esc(p.type) + "</span> " +
      p.tags.map(function (t) { return "<span class='tag'>" + esc(t) + "</span>"; }).join(" ") +
      "</div>";
    renderReader("<h1>" + esc(p.title) + "</h1>" + meta +
      (p.description ? "<p class='desc'>" + esc(p.description) + "</p>" : "") +
      backlinkList("Referenced by:", p.inbound) + "<hr>" + mdToHtml(p.body, p.rel_path, fnSrc));
    Graph.setActive(rel);
  }

  function rawFileLink(s, label) {
    if (!s.href || s.missing) return "";
    return "<a class='rawfile' href='" + esc(encodeURI(s.href)) +
      "' target='_blank' rel='noopener'>" + label + " ↗</a>";
  }

  function openSource(sid) {
    var s = SOURCES[sid];
    if (!s) return;
    var want = "src:" + encodeURIComponent(sid);
    if ((location.hash || "").slice(1) !== want) { location.hash = want; }
    var open = rawFileLink(s, "Open original file");
    var meta = "<div class='meta'><span class='ptype src'>Source</span> <span class='src-id'>" +
      esc(s.id) + "</span>" + (s.model ? " <span class='src-model'>via " + esc(s.model) +
      "</span>" : "") + (open ? " " + open : "") + "</div>";
    var body;
    if (s.missing) {
      body = "<div class='callout'><div class='callout-title'>SOURCE UNAVAILABLE</div>" +
        "<div class='callout-body'>The raw file <code>" + esc(s.id) +
        "</code> was not found when this viewer was generated. Re-run <code>citadel view</code> " +
        "with the source present to embed its content.</div></div>";
    } else if (s.kind === "binary") {
      // A PDF or other binary: we can't render it inline without a heavy dependency, so open the
      // original file (the browser shows a PDF natively).
      body = "<div class='callout'><div class='callout-title'>BINARY SOURCE</div>" +
        "<div class='callout-body'>This source is a binary file (e.g. a PDF) and can't be " +
        "rendered inline. " + (s.href
          ? "Use <strong>Open original file</strong> above — a PDF opens directly in your browser."
          : "Open the raw file <code>" + esc(s.id) + "</code> directly to read it.") +
        "</div></div>";
    } else {
      body = (s.kind === "office"
        ? "<p class='desc'>Text extracted from the original document.</p>" : "") +
        mdToHtml(s.body, sid, {});
      if (s.truncated) {
        body += "<div class='callout'><div class='callout-title'>TRUNCATED</div>" +
          "<div class='callout-body'>This source was longer than the embed limit and was " +
          "truncated. Open the original file to read it in full.</div></div>";
      }
    }
    renderReader("<h1>" + esc(s.title) + "</h1>" + meta +
      backlinkList("Cited by:", s.cited_by) + "<hr>" + body);
    Graph.setActive("src:" + sid);
  }

  // ---- Source hover preview popover. ----

  var pop = null;
  function showPop(sid, anchor) {
    var s = SOURCES[sid]; if (!s) return;
    if (!pop) pop = document.getElementById("srcpop");
    var note = s.missing ? " · (file unavailable)"
      : (s.kind === "binary" ? " · (binary — opens original)" : "");
    pop.innerHTML = "<div class='sp-title'>" + esc(s.title) + "</div><div class='sp-meta'>" +
      esc(s.id) + (s.model ? " · " + esc(s.model) : "") + note + "</div>" +
      (s.snippet ? "<div class='sp-snip'>" + esc(s.snippet) + "…</div>" : "") +
      "<div class='sp-hint'>Click to open source</div>";
    pop.classList.add("show");
    var r = anchor.getBoundingClientRect();
    var x = Math.min(r.left, window.innerWidth - pop.offsetWidth - 8);
    var y = r.bottom + 6;
    if (y + pop.offsetHeight > window.innerHeight) y = r.top - pop.offsetHeight - 6;
    pop.style.left = Math.max(8, x) + "px";
    pop.style.top = Math.max(8, y) + "px";
  }
  function hidePop() { if (pop) pop.classList.remove("show"); }

  document.addEventListener("mouseover", function (ev) {
    var a = ev.target.closest && ev.target.closest("[data-pop]");
    if (a) showPop(a.getAttribute("data-pop"), a);
  });
  document.addEventListener("mouseout", function (ev) {
    var a = ev.target.closest && ev.target.closest("[data-pop]");
    if (a) hidePop();
  });
  document.addEventListener("click", function (ev) {
    // The graph pane (nodes + toolbar) handles its own pointer events.
    if (ev.target.closest && ev.target.closest("#graph-pane")) return;
    var s = ev.target.closest("[data-source]");
    if (s) { ev.preventDefault(); hidePop(); openSource(s.getAttribute("data-source")); return; }
    var a = ev.target.closest("[data-page]");
    if (a) { ev.preventDefault(); openPage(a.getAttribute("data-page")); return; }
    var tc = ev.target.closest(".toc a[data-h]");
    if (tc) {
      ev.preventDefault();
      var h = document.getElementById(tc.getAttribute("data-h"));
      if (h) h.scrollIntoView();
      return;
    }
    var tg = ev.target.closest("[data-tag]");
    if (tg) { activeTag = tg.getAttribute("data-tag"); renderTags(); renderSidebar(); }
  });
  document.getElementById("search").addEventListener("input", renderSidebar);
  document.addEventListener("keydown", function (ev) {
    if (ev.key === "/" && document.activeElement.id !== "search") {
      ev.preventDefault(); document.getElementById("search").focus();
    } else if (ev.key === "Escape") {
      hidePop();
      if (document.activeElement.id === "search") document.activeElement.blur();
    }
  });

  function route() {
    var h = decodeURIComponent((location.hash || "").slice(1));
    if (h.indexOf("src:") === 0) { if (SOURCES[h.slice(4)]) openSource(h.slice(4)); }
    else if (h && PAGES[h]) openPage(h);
  }
  window.addEventListener("hashchange", route);

  renderTags();
  renderSidebar();
  Graph.init();
  renderLegend();

  function renderLegend() {
    var box = document.getElementById("graph-legend");
    if (!box) return;
    var html = Object.keys(BUNDLE.types).sort().map(function (t) {
      return "<span class='lg'><span class='sw' style='background:" + (typeColor[t] || "#888") +
        "'></span>" + esc(t) + "</span>";
    }).join("");
    if (Object.keys(SOURCES).length) {
      html += "<span class='lg'><span class='sw src' style='background:" + SOURCE_COLOR +
        "'></span>Source</span>";
    }
    box.innerHTML = html;
  }

  // Map toolbar: collapse (give the reader full height), zoom, fit, toggle the source layer.
  var content = document.getElementById("content");
  var collapseBtn = document.getElementById("g-collapse");
  function setCollapsed(c) {
    content.classList.toggle("map-collapsed", c);
    collapseBtn.textContent = c ? "▸" : "▾";
    collapseBtn.title = c ? "Show map" : "Collapse map";
    try { localStorage.setItem("okf_map_collapsed", c ? "1" : "0"); } catch (e) {}
    if (!c) Graph.refit();  // pane size changed — re-fit the layout
  }
  collapseBtn.addEventListener("click", function () {
    setCollapsed(!content.classList.contains("map-collapsed"));
  });
  document.getElementById("g-zoomin").addEventListener("click", function () { Graph.zoom(1.25); });
  document.getElementById("g-zoomout").addEventListener("click", function () { Graph.zoom(0.8); });
  document.getElementById("g-fit").addEventListener("click", function () { Graph.refit(); });

  var srcBtn = document.getElementById("g-sources");
  function setShowSources(on) {
    Graph.setShowSources(on);
    srcBtn.classList.toggle("active", on);
    srcBtn.title = on ? "Hide sources in the map" : "Show sources in the map";
    try { localStorage.setItem("okf_show_sources", on ? "1" : "0"); } catch (e) {}
  }
  srcBtn.addEventListener("click", function () {
    setShowSources(!srcBtn.classList.contains("active"));
  });
  try { if (localStorage.getItem("okf_show_sources") === "1") setShowSources(true); } catch (e) {}
  try { if (localStorage.getItem("okf_map_collapsed") === "1") setCollapsed(true); } catch (e) {}
  var rt;
  window.addEventListener("resize", function () {
    clearTimeout(rt); rt = setTimeout(function () { Graph.refit(); }, 150);
  });

  var initial = decodeURIComponent((location.hash || "").slice(1));
  if (initial.indexOf("src:") === 0 && SOURCES[initial.slice(4)]) openSource(initial.slice(4));
  else if (initial && PAGES[initial]) openPage(initial);
  else if (BUNDLE.pages.length) openPage(BUNDLE.pages[0].rel_path);
})();
</script>
</body>
</html>
