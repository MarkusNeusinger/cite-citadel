name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the declared minimum (pyproject `requires-python`); 3.13/3.14 guard forward-compat.
        # Full Python spread on ubuntu; windows/macos run only the edges (3.12 + 3.14) to keep the
        # job count sane. Windows in particular is load-bearing: the SMB/network-share hardening
        # (_robust_*, read-only-bit clearing, UTF-8 forcing) is exercised nowhere else in CI.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
        exclude:
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    defaults:
      run:
        # One shell on every OS (git-bash on Windows) so steps stay byte-identical across the matrix.
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q --cov=citadel --cov-report=xml

      - name: Upload coverage to Codecov
        # One upload per PR/push is enough — send it from the ubuntu 3.12 cell only,
        # and skip fork PRs (CODECOV_TOKEN is not exposed to them). fail_ci_if_error
        # stays false so a missing token / codecov hiccup never reds CI.
        if: >-
          matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Lint every committed showcase wiki (structural health check)
        # Each committed showcase (corpora/<name>/) is its own self-contained workspace with a nested
        # citadel.toml marker (plain raw/X keys); CITADEL_WORKSPACE selects the nested one over the
        # checkout root's marker. The loop is unconditional over all nine corpora: every PRESENT
        # showcase is linted and a MISSING one is a FAILURE (all nine must be committed). Failures
        # — missing wiki OR a lint failure — are COLLECTED across the whole loop (no early bail) and
        # reported together, so one red run names every corpus that needs fixing.
        run: |
          rc=0
          failures=""
          for c in beverages kelvarra leuchtfeuer pemberley injection-resistance clockwork flurfunk gazette kontor; do
            if [ -f "corpora/$c/wiki/index.md" ]; then
              echo "== lint $c =="
              if ! CITADEL_WORKSPACE="corpora/$c" uv run python -m citadel lint; then
                echo "::error::lint failed for corpora/$c"
                failures="$failures $c(lint)"
                rc=1
              fi
            else
              echo "::error::corpora/$c/wiki/index.md is missing — all nine committed showcases must be present"
              failures="$failures $c(missing)"
              rc=1
            fi
          done
          if [ "$rc" -ne 0 ]; then
            echo "::error::showcase lint gate failed for:$failures"
          fi
          exit $rc

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # Regression gate for the phantom-workspace bug class: prove the WHEEL ALONE works — installed
  # into a clean venv (no checkout on sys.path, no dev deps) and driven from a temp CWD outside
  # the checkout (no citadel.toml above it, no CITADEL_* env). Each step checks exactly one layer,
  # so the first red step names what broke:
  #   uv build             -> build backend / project metadata
  #   twine check          -> distribution metadata (PyPI would reject it)
  #   venv + pip install   -> wheel installability (runtime deps mcp + pyyaml only)
  #   packaged data        -> rules/ + templates/ actually shipped INSIDE the wheel
  #   citadel --version    -> console entry point + version wiring
  #   fail-loud guard      -> workspace discovery must NOT invent a phantom workspace
  #   init / check / search -> workspace scaffold + read paths of the installed package
  wheel-smoke:
    name: wheel-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        # git-bash on Windows: globs, mktemp and `source` behave the same as on ubuntu.
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Check distribution metadata (twine)
        run: uvx twine check dist/*

      - name: Install ONLY the wheel into a clean venv
        # --seed puts pip into the venv; the activate glob resolves bin/ (POSIX) or Scripts/ (Windows).
        # The venv's script dir goes onto $GITHUB_PATH once (pwd -W yields the native Windows path
        # under git-bash; plain pwd elsewhere), so every later step runs citadel/python directly —
        # from a smoke dir OUTSIDE the checkout, via per-step working-directory.
        run: |
          uv venv --seed smoke-venv
          source smoke-venv/*/activate
          python -m pip install --no-cache-dir dist/*.whl
          echo "$(cd "$(dirname smoke-venv/*/activate)" && { pwd -W 2>/dev/null || pwd; })" >> "$GITHUB_PATH"
          mkdir -p "${{ runner.temp }}/smoke"

      - name: Wheel completeness — packaged rules + templates
        # From a CWD with no ./citadel directory, imports MUST resolve to site-packages; the agent
        # rules and the .env template are package data and must travel inside the wheel. The
        # expected set is enumerated from the CHECKOUT (citadel/rules/**/*.md) — self-maintaining,
        # so a newly added rules file that fails to ship in the wheel turns this step red.
        working-directory: ${{ runner.temp }}/smoke
        env:
          CHECKOUT: ${{ github.workspace }}
        run: |
          python - <<'EOF'
          import os
          from importlib import resources
          from pathlib import Path
          import citadel
          print("citadel imported from:", citadel.__file__)
          src = Path(os.environ["CHECKOUT"]) / "citadel"
          expected = sorted(p.relative_to(src).as_posix() for p in (src / "rules").rglob("*.md") if p.is_file())
          if not expected:
              raise SystemExit(f"no rules files found under {src / 'rules'} — wrong CHECKOUT path?")
          expected.append("templates/env.example")
          pkg = resources.files("citadel")
          missing = [rel for rel in expected if not pkg.joinpath(rel).is_file()]
          if missing:
              raise SystemExit(f"wheel is missing packaged data: {missing} — check the hatchling wheel config / package layout")
          print(f"packaged rules + templates present in the installed wheel ({len(expected)} files)")
          EOF

      - name: Smoke — citadel --version (console entry point)
        working-directory: ${{ runner.temp }}/smoke
        run: citadel --version

      - name: Smoke — fail loud outside any workspace (no phantom workspace)
        working-directory: ${{ runner.temp }}/smoke
        run: |
          if citadel check; then
            echo "::error::'citadel check' succeeded in a CWD with no citadel.toml marker and no CITADEL_* dirs — workspace discovery invented a phantom workspace"
            exit 1
          fi
          echo "OK: workspace-less 'citadel check' failed loud, as designed"

      - name: Smoke — citadel init demo (workspace scaffold)
        working-directory: ${{ runner.temp }}/smoke
        run: |
          citadel init demo
          test -f demo/citadel.toml
          test -f demo/.env
          test -d demo/raw
          test -d demo/wiki

      - name: Smoke — citadel check on the fresh workspace (must be clean)
        working-directory: ${{ runner.temp }}/smoke/demo
        run: citadel check

      - name: Smoke — citadel search on the empty wiki (must exit 0, no matches)
        working-directory: ${{ runner.temp }}/smoke/demo
        run: citadel search x
