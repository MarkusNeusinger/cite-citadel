name: Deploy demo to Pages

# Regenerate the offline wiki viewer from the committed beverages showcase wiki
# (corpora/beverages/wiki) and publish it as the live demo
# at https://<owner>.github.io/cite-citadel/ on every push to main. Enable once under
# Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate the offline wiki viewer
        # The committed showcase wiki lives at corpora/beverages/, which is its own self-contained
        # workspace (a nested citadel.toml marker with plain raw/X keys); point discovery at it.
        env:
          CITADEL_WORKSPACE: corpora/beverages
        run: uv run python -m citadel view --no-open --out _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
