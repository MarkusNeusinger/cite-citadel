name: Deploy demo gallery to Pages

# Regenerate one offline wiki viewer per committed showcase corpus (corpora/<name>/wiki) and publish
# them as a gallery at https://<owner>.github.io/cite-citadel/ on every push to main: a lean landing
# page (.github/pages-index.html) links each corpus's viewer at site/<name>/. Enable once under
# Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build the gallery (landing page + one viewer per corpus)
        # Each committed showcase (corpora/<name>/) is its own self-contained workspace (a nested
        # citadel.toml marker with plain raw/X keys); CITADEL_WORKSPACE points discovery at it while
        # the CWD stays the repo root, so `view --out site/<name>/index.html` writes under ./site.
        # The loop is unconditional over all seven corpora and a MISSING showcase wiki FAILS the
        # build (all seven committed showcases must be present, so an incomplete gallery never
        # deploys); missing corpora are collected and reported together, not bailed on one-by-one.
        run: |
          mkdir -p site
          cp .github/pages-index.html site/index.html
          missing=""
          for c in beverages kelvarra leuchtfeuer pemberley injection-resistance clockwork flurfunk; do
            if [ -f "corpora/$c/wiki/index.md" ]; then
              echo "building viewer for $c"
              CITADEL_WORKSPACE="corpora/$c" uv run python -m citadel view --no-open --out "site/$c/index.html"
            else
              echo "::error::corpora/$c/wiki/index.md is missing — all seven committed showcases must be present"
              missing="$missing $c"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::incomplete gallery — missing corpus wiki(s):$missing"
            exit 1
          fi
          echo "gallery contents:"
          find site -name index.html | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
