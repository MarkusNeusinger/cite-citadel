# Release: on every v* tag, build with uv, publish to PyPI via Trusted Publishing (OIDC — no API
# token stored anywhere), then attach dist/* to a GitHub Release with generated notes.
#
# ONE-TIME SETUP required BEFORE the first tag (otherwise the publish job fails with
# "invalid-publisher"): register a Trusted Publisher on PyPI at
#   https://pypi.org/manage/account/publishing/
# with exactly:
#   PyPI project name : cite-citadel
#   Owner             : MarkusNeusinger
#   Repository name   : cite-citadel
#   Workflow name     : release.yml
#   Environment name  : pypi
# and create the matching "pypi" environment in this repo under Settings -> Environments.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Check distribution metadata (twine)
        run: uvx twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cite-citadel
    permissions:
      # OIDC token for PyPI Trusted Publishing — the pypa action exchanges it for a short-lived
      # PyPI API token at publish time.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    # Deliberately independent of publish-pypi: a tag always produces a GitHub Release with the
    # built artifacts, even while the PyPI Trusted Publisher is not configured yet.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release and upload the dist assets
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with generated notes + dist assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
